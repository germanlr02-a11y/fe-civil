<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FE Civil"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>FE Civil Mastery</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#111;--brd:#2a2a2a;--tx:#e5e5e5;--tx2:#888;--tx3:#555;--acc:#f5c518;--acc2:#1a1600;--acc3:#3a3000;--card:rgba(20,20,20,0.96);--green:#22c55e;--red:#ef4444;}
.light{--bg:#f0f0e8;--bg2:#fff;--bg3:#f5f5f0;--brd:#ddd;--tx:#1a1a1a;--tx2:#888;--tx3:#aaa;--acc:#d4a200;--acc2:#fffbe6;--acc3:#f5d060;--card:rgba(255,255,255,0.96);--green:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.app{padding:20px 16px 80px;max-width:520px;margin:0 auto;position:relative;z-index:1;}
.bg-svg{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
h1{font-size:21px;font-weight:600;color:var(--tx);}
.sub{font-size:13px;color:var(--tx2);margin-top:3px;}
.card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:18px;margin-bottom:12px;backdrop-filter:blur(8px);}
.lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block;}
select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:14px;outline:none;appearance:none;font-family:inherit;}
select:focus{border-color:var(--acc);}
.seg{display:flex;background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:4px;margin-bottom:12px;}
.seg-btn{flex:1;padding:9px 8px;border-radius:9px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.seg-btn.active{background:var(--acc);color:#0a0a0a;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sm-btn{padding:9px 0;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;}
.sm-btn.active{border-color:var(--acc);background:var(--acc2);color:var(--acc);}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--acc);color:#0a0a0a;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.btn:active{opacity:.85;}
.btn-sec{flex:1;padding:11px;border-radius:12px;border:1px solid var(--brd);background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.tab-bar{display:flex;background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:4px;margin-bottom:14px;}
.tab{flex:1;padding:9px 4px;border-radius:9px;border:none;background:transparent;color:var(--tx3);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.tab.active{background:var(--acc);color:#0a0a0a;}
.opt{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:14px;text-align:left;cursor:pointer;margin-bottom:7px;line-height:1.4;display:block;font-family:inherit;}
.opt.correct{border-color:var(--green);background:#0d2b1d;color:#86efac;}
.opt.wrong{border-color:var(--red);background:#2b0d0d;color:#fca5a5;}
.opt.selected{border-color:var(--acc);background:var(--acc2);color:var(--acc);}
.light .opt.correct{background:#dcfce7;color:#14532d;}
.light .opt.wrong{background:#fee2e2;color:#991b1b;}
.light .opt.selected{background:#fffbe6;color:#78570a;}
.bar-bg{height:4px;background:var(--brd);border-radius:99px;margin-bottom:16px;}
.bar-fill{height:4px;background:var(--acc);border-radius:99px;transition:width .3s;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-y{background:var(--acc2);color:var(--acc);border:1px solid var(--acc3);}
.badge-g{background:#0d2b1d;color:#86efac;}
.badge-r{background:#2b0d0d;color:#fca5a5;}
.light .badge-g{background:#dcfce7;color:#14532d;}
.light .badge-r{background:#fee2e2;color:#991b1b;}
.explain{background:var(--acc2);border:1px solid var(--acc3);border-left:3px solid var(--acc);border-radius:10px;padding:11px 13px;margin-bottom:12px;}
.explain p{font-size:13px;color:var(--acc);line-height:1.6;}
.light .explain p{color:#78570a;}
.formula-box{background:var(--bg3);border:1px solid var(--acc3);border-left:3px solid var(--acc);border-radius:10px;padding:9px 13px;margin-bottom:10px;font-family:'Courier New',monospace;font-size:13px;color:var(--acc);line-height:1.7;}
.formula-card{background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:7px;}
.err{background:#2b0d0d;border:1px solid #7f1d1d;border-radius:10px;padding:11px 13px;margin-bottom:12px;color:#fca5a5;font-size:13px;}
.spin{width:38px;height:38px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.score-big{font-size:52px;font-weight:600;color:var(--acc);line-height:1;}
.review-ok{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #14532d;background:#0a1f15;}
.review-ng{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #7f1d1d;background:#1f0a0a;}
.light .review-ok{background:#f0fdf4;border-color:#bbf7d0;}
.light .review-ng{background:#fff1f2;border-color:#fecdd3;}
.divider{height:1px;background:var(--brd);margin:12px 0;}
.weak-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg2);}
.weak-bar-bg{width:70px;height:4px;background:var(--brd);border-radius:99px;overflow:hidden;}
.conf-row{display:flex;gap:7px;margin-bottom:10px;}
.conf-btn{flex:1;padding:9px 4px;border-radius:10px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;background:transparent;text-align:center;font-family:inherit;}
.timer-num{font-size:15px;font-weight:600;color:var(--acc);}
.timer-warn{color:var(--red)!important;}
.streak{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:var(--acc2);border:1px solid var(--acc3);font-size:12px;font-weight:600;color:var(--acc);}
.icon-wrap{width:50px;height:50px;border-radius:14px;background:var(--acc2);border:1px solid var(--acc3);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;}
.theme-btn{position:fixed;top:14px;right:14px;z-index:100;padding:7px 13px;border-radius:99px;border:1px solid var(--brd);background:var(--card);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:20px;padding:24px;width:100%;max-width:340px;}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);}
.note-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:13px;font-family:inherit;resize:none;outline:none;min-height:80px;}
</style>
</head>

<script>

  if(btn) btn.textContent = isDark ? '☀ Light' : '● Dark';
  drawBG();
}
function toggleTheme(){
  isDark = !isDark;
  try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}

  render();
}

var QB = [
// ETHICS
{id:“e1”,cat:“Ethics”,mode:“conceptual”,diff:“Easy”,q:“Under NSPE Code of Ethics, an engineer’s paramount obligation is to:”,opts:[“A. Serve the client’s financial interests”,“B. Hold public safety, health, and welfare paramount”,“C. Maintain confidentiality of all project data”,“D. Minimize project costs”],ans:“B”,exp:“First canon of NSPE: engineers shall hold public safety, health, and welfare paramount.”},
{id:“e2”,cat:“Ethics”,mode:“conceptual”,diff:“Easy”,q:“An engineer discovers a design flaw after construction begins. The MOST ethical action is to:”,opts:[“A. Continue and correct in the next phase”,“B. Notify the client and stop work if there is danger”,“C. Document the flaw and proceed”,“D. Inform the contractor only”],ans:“B”,exp:“Engineers must notify responsible parties and halt work posing safety risks.”},
{id:“e3”,cat:“Ethics”,mode:“conceptual”,diff:“Medium”,q:“An engineer can sign and seal plans prepared by another engineer when:”,opts:[“A. Both hold PE licenses in the same state”,“B. The engineer reviews, adapts, and takes full responsibility”,“C. The client authorizes it”,“D. The plans are for a minor project”],ans:“B”,exp:“A PE may seal work they reviewed and took professional responsibility for — not simply rubber-stamp.”},
{id:“e4”,cat:“Ethics”,mode:“conceptual”,diff:“Medium”,q:“Which is NOT a conflict of interest requiring disclosure?”,opts:[“A. Engineer owns stock in a specified supplier”,“B. Engineer is related to the bidding contractor”,“C. Engineer attended the same university as the client”,“D. Engineer serves on a board regulating the project”],ans:“C”,exp:“Attending the same school is not a financial or fiduciary conflict of interest.”},
{id:“e5”,cat:“Ethics”,mode:“conceptual”,diff:“Easy”,q:“Advertising engineering services in a false or misleading manner is:”,opts:[“A. Permitted if it attracts clients”,“B. A violation of professional ethics”,“C. Only prohibited for public sector work”,“D. Allowed with client consent”],ans:“B”,exp:“NSPE prohibits false, misleading, or deceptive advertising.”},
{id:“e6”,cat:“Ethics”,mode:“conceptual”,diff:“Medium”,q:”‘Responsible charge’ in engineering means:”,opts:[“A. Financial liability for overruns”,“B. Direct control and personal supervision of engineering work”,“C. Reviewing completed drawings before sealing”,“D. Signing contracts on behalf of a firm”],ans:“B”,exp:“Responsible charge = direct control and supervision, not just reviewing the final product.”},
{id:“e7”,cat:“Ethics”,mode:“conceptual”,diff:“Easy”,q:“An engineer shall not reveal confidential client information without:”,opts:[“A. Payment for the information”,“B. Consent of the client, unless required by law”,“C. Approval from the state board”,“D. Review by a senior partner”],ans:“B”,exp:“Confidentiality is maintained unless client consents or law requires disclosure.”},
{id:“e8”,cat:“Ethics”,mode:“conceptual”,diff:“Medium”,q:“A PE who allows a non-licensed person to use their seal is subject to:”,opts:[“A. A written warning only”,“B. License revocation and legal penalties”,“C. Acceptable if the person is an EIT”,“D. Acceptable for projects under a dollar threshold”],ans:“B”,exp:“Allowing seal misuse — subject to revocation, fines, and criminal charges.”},
{id:“e9”,cat:“Ethics”,mode:“conceptual”,diff:“Medium”,q:”‘Sustainable development’ in engineering ethics means:”,opts:[“A. Minimizing project cost”,“B. Meeting present needs without compromising future generations”,“C. Using only recycled materials”,“D. Designing for a 100-year life span”],ans:“B”,exp:“Brundtland definition: development meeting present needs without compromising future generations.”},
{id:“e10”,cat:“Ethics”,mode:“conceptual”,diff:“Hard”,q:“If an engineer believes a project violates public safety but the employer disagrees, the engineer should first:”,opts:[“A. Immediately report to authorities”,“B. Resign from the project”,“C. Notify the employer in writing and document the concern”,“D. Proceed and note the objection in files”],ans:“C”,exp:“Document concerns formally with employer first; escalate to authorities only if unresolved.”},
// GEOTECHNICAL
{id:“g1”,cat:“Geotechnical”,mode:“conceptual”,diff:“Easy”,q:“Effective stress in soil equals:”,opts:[“A. Total stress minus pore water pressure”,“B. Total stress plus pore water pressure”,“C. Stress at failure”,“D. Stress at the surface”],ans:“A”,exp:“σ’ = σ − u. Effective stress controls shear strength and consolidation.”},
{id:“g2”,cat:“Geotechnical”,mode:“conceptual”,diff:“Easy”,q:“In USCS, a soil with more than 50% passing the No. 200 sieve is:”,opts:[“A. Gravel”,“B. Sand”,“C. Fine-grained soil”,“D. Organic soil”],ans:“C”,exp:“USCS: >50% passing #200 = fine-grained (silt or clay).”},
{id:“g3”,cat:“Geotechnical”,mode:“conceptual”,diff:“Medium”,q:“Active earth pressure develops when a retaining wall:”,opts:[“A. Is pushed into the soil”,“B. Moves away from the backfill”,“C. Is completely rigid”,“D. Is founded on rock”],ans:“B”,exp:“Active pressure forms when wall moves away from soil, allowing lateral expansion.”},
{id:“g4”,cat:“Geotechnical”,mode:“conceptual”,diff:“Medium”,q:“SPT N-value measures:”,opts:[“A. Unconfined compressive strength”,“B. Blow count as a measure of soil resistance”,“C. Permeability”,“D. In-situ moisture content”],ans:“B”,exp:“SPT N-value = blows per foot — used to estimate relative density and strength.”},
{id:“g5”,cat:“Geotechnical”,mode:“conceptual”,diff:“Easy”,q:“Proctor compaction tests determine:”,opts:[“A. Shear strength vs depth”,“B. Dry unit weight vs moisture content”,“C. Permeability vs void ratio”,“D. Settlement vs time”],ans:“B”,exp:“Proctor finds optimum moisture content for maximum dry unit weight.”},
{id:“g6”,cat:“Geotechnical”,mode:“conceptual”,diff:“Medium”,q:“OCR > 1 means the soil:”,opts:[“A. Has never been loaded”,“B. Was previously subjected to greater effective stress than currently”,“C. Is at its maximum past pressure”,“D. Has a high liquid limit”],ans:“B”,exp:“OCR = σ’p/σ’v0 > 1 → soil is overconsolidated.”},
{id:“g7”,cat:“Geotechnical”,mode:“conceptual”,diff:“Hard”,q:“Critical hydraulic gradient in soil occurs when:”,opts:[“A. Flow velocity exceeds erosion velocity”,“B. Effective stress equals zero — piping or heave initiation”,“C. Permeability exceeds 10⁻² cm/s”,“D. Pore pressure equals atmospheric”],ans:“B”,exp:“ic = γ’/γw. When upward gradient equals ic, effective stress → 0 and piping can occur.”},
{id:“g8”,cat:“Geotechnical”,mode:“conceptual”,diff:“Easy”,q:“PI = 0 means the soil is:”,opts:[“A. Highly plastic clay”,“B. Non-plastic”,“C. Expansive clay”,“D. Organic”],ans:“B”,exp:“PI = LL − PL = 0 → no plastic range, non-plastic behavior.”},
{id:“g9”,cat:“Geotechnical”,mode:“computational”,diff:“Easy”,q:“Total unit weight = 120 pcf, water content = 20%. Dry unit weight:”,opts:[“A. 96 pcf”,“B. 100 pcf”,“C. 110 pcf”,“D. 144 pcf”],ans:“B”,exp:“γd = γ/(1+w) = 120/1.20 = 100 pcf”,formula:“γd = γ / (1 + w)”},
{id:“g10”,cat:“Geotechnical”,mode:“computational”,diff:“Medium”,q:“Ka for φ = 30°:”,opts:[“A. 0.17”,“B. 0.33”,“C. 0.50”,“D. 0.67”],ans:“B”,exp:“Ka = tan²(45−15) = tan²(30) = 0.333”,formula:“Ka = tan²(45 − φ/2)”},
{id:“g11”,cat:“Geotechnical”,mode:“computational”,diff:“Medium”,q:“Effective vertical stress at 10 ft: top 5 ft γ=110 pcf (above WT), bottom 5 ft γsat=125 pcf, γw=62.4 pcf:”,opts:[“A. 312 psf”,“B. 550 psf”,“C. 862 psf”,“D. 1,093 psf”],ans:“C”,exp:“σv=110×5+125×5=1175. u=62.4×5=312. σ’=1175−312=863 psf”,formula:“σ’v = σv − u”},
{id:“g12”,cat:“Geotechnical”,mode:“computational”,diff:“Hard”,q:“Footing: B=4 ft, D=2 ft, c=500 psf, φ=0, γ=115 pcf, Nc=5.7, Nq=1. Ultimate bearing capacity:”,opts:[“A. 2,850 psf”,“B. 3,080 psf”,“C. 4,000 psf”,“D. 5,700 psf”],ans:“B”,exp:“qu=cNc+γDNq=500×5.7+115×2=2850+230=3,080 psf”,formula:“qu = cNc + γDNq + 0.5γBNγ”},
{id:“g13”,cat:“Geotechnical”,mode:“conceptual”,diff:“Medium”,q:“Liquefaction risk is highest in:”,opts:[“A. Dense gravel under high pressure”,“B. Loose saturated sand under seismic loading”,“C. Stiff clay”,“D. Dry cohesionless soil”],ans:“B”,exp:“Liquefaction occurs in loose, saturated, cohesionless soils under rapid cyclic loading.”},
{id:“g14”,cat:“Geotechnical”,mode:“conceptual”,diff:“Medium”,q:“A flow net is used to determine:”,opts:[“A. Bearing capacity”,“B. Seepage quantity and pore pressures”,“C. Consolidation rate”,“D. Slope stability”],ans:“B”,exp:“Flow nets graphically solve seepage — find flow quantity and pore pressure distribution.”},
// STRUCTURAL
{id:“s1”,cat:“Structural”,mode:“conceptual”,diff:“Easy”,q:“Maximum moment in a simply supported beam with UDL occurs at:”,opts:[“A. Supports”,“B. Quarter points”,“C. Midspan”,“D. Third points”],ans:“C”,exp:“M_max = wL²/8 at midspan for SS beam with uniform load.”},
{id:“s2”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“Stirrups in reinforced concrete beams resist:”,opts:[“A. Flexure”,“B. Diagonal tension (shear)”,“C. Deflection”,“D. Corrosion”],ans:“B”,exp:“Stirrups are transverse reinforcement resisting shear (diagonal tension) cracking.”},
{id:“s3”,cat:“Structural”,mode:“conceptual”,diff:“Easy”,q:“Hooke’s Law σ = Eε states:”,opts:[“A. Stress is inversely proportional to strain”,“B. Stress is proportional to strain within elastic range”,“C. Stress equals yield stress”,“D. Stress is independent of modulus”],ans:“B”,exp:“σ = Eε: linear elastic behavior within the proportional limit.”},
{id:“s4”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“At the neutral axis of a beam in bending:”,opts:[“A. Shear stress is zero”,“B. Bending stress is zero”,“C. Deflection is maximum”,“D. Moment is maximum”],ans:“B”,exp:“Bending stress is zero at the neutral axis. Increases linearly away from it.”},
{id:“s5”,cat:“Structural”,mode:“conceptual”,diff:“Easy”,q:“E for structural steel is approximately:”,opts:[“A. 10,000 ksi”,“B. 15,000 ksi”,“C. 29,000 ksi”,“D. 57,000 ksi”],ans:“C”,exp:“E_steel = 29,000 ksi (200 GPa).”},
{id:“s6”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“Truss members carry only:”,opts:[“A. Shear and bending”,“B. Axial forces (tension or compression)”,“C. Torsion”,“D. All of the above”],ans:“B”,exp:“Ideal truss members are two-force members — pinned ends, axial only.”},
{id:“s7”,cat:“Structural”,mode:“conceptual”,diff:“Easy”,q:“Factor of safety (FS) is:”,opts:[“A. Design load / applied load”,“B. Resistance / demand”,“C. Ultimate strength / elastic limit”,“D. Yield stress / ultimate stress”],ans:“B”,exp:“FS = Resistance/Demand. FS > 1 means capacity exceeds demand.”},
{id:“s8”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“Creep in concrete is:”,opts:[“A. Sudden failure under impact”,“B. Long-term deformation under sustained load”,“C. Cracking due to thermal expansion”,“D. Foundation settlement”],ans:“B”,exp:“Creep is time-dependent deformation of concrete under sustained compressive stress.”},
{id:“s9”,cat:“Structural”,mode:“computational”,diff:“Easy”,q:“SS beam: L=20 ft, w=2 kip/ft. Maximum moment:”,opts:[“A. 50 kip-ft”,“B. 100 kip-ft”,“C. 200 kip-ft”,“D. 400 kip-ft”],ans:“B”,exp:“M = wL²/8 = 2×400/8 = 100 kip-ft”,formula:“M = wL²/8”},
{id:“s10”,cat:“Structural”,mode:“computational”,diff:“Medium”,q:“Rect. beam b=10 in, h=18 in. Moment of inertia:”,opts:[“A. 2,430 in⁴”,“B. 4,860 in⁴”,“C. 8,748 in⁴”,“D. 1,215 in⁴”],ans:“B”,exp:“I = bh³/12 = 10×18³/12 = 4,860 in⁴”,formula:“I = bh³/12”},
{id:“s11”,cat:“Structural”,mode:“computational”,diff:“Medium”,q:“M=100 kip-ft, I=4860 in⁴, c=9 in. Bending stress:”,opts:[“A. 1.1 ksi”,“B. 2.2 ksi”,“C. 4.4 ksi”,“D. 0.55 ksi”],ans:“B”,exp:“σ = Mc/I = (100×12×9)/4860 ≈ 2.22 ksi”,formula:“σ = Mc/I”},
{id:“s12”,cat:“Structural”,mode:“conceptual”,diff:“Hard”,q:“A fixed-end beam carries higher loads than SS beam because:”,opts:[“A. Fixed ends increase span”,“B. Negative moments at ends reduce midspan moment”,“C. Fixed ends prevent all deflection”,“D. Material strengthens at connections”],ans:“B”,exp:“Fixed ends develop negative moments, reducing midspan positive moment from wL²/8 to wL²/24.”},
{id:“s13”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“In LRFD design, load factors are applied to:”,opts:[“A. Resistance side”,“B. Load (demand) side”,“C. Both sides equally”,“D. Neither”],ans:“B”,exp:“LRFD: factored loads (demand) ≤ φRn (factored resistance). Load factors amplify demand.”},
{id:“s14”,cat:“Structural”,mode:“conceptual”,diff:“Medium”,q:“Which support provides horizontal + vertical reactions but no moment?”,opts:[“A. Fixed support”,“B. Pin support”,“C. Roller support”,“D. Free end”],ans:“B”,exp:“Pin: Rx and Ry, no moment. Roller: Ry only. Fixed: Rx, Ry, and moment.”},
// TRANSPORTATION
{id:“t1”,cat:“Transportation”,mode:“conceptual”,diff:“Easy”,q:“Stopping Sight Distance (SSD) is the distance needed to:”,opts:[“A. Change lanes”,“B. Perceive a hazard and stop before reaching it”,“C. Complete a U-turn”,“D. Accelerate to highway speed”],ans:“B”,exp:“SSD = perception-reaction distance + braking distance.”},
{id:“t2”,cat:“Transportation”,mode:“conceptual”,diff:“Medium”,q:“Superelevation on a horizontal curve counteracts:”,opts:[“A. Increases pavement thickness”,“B. Centrifugal force on vehicles”,“C. Reduces drainage”,“D. Minimizes earthwork”],ans:“B”,exp:“Superelevation (banking) tilts roadway inward to counter centripetal acceleration.”},
{id:“t3”,cat:“Transportation”,mode:“conceptual”,diff:“Easy”,q:“AASHTO Green Book covers:”,opts:[“A. Pavement material specs”,“B. Geometric design of highways”,“C. Traffic signal timing”,“D. Structural pavement design”],ans:“B”,exp:“AASHTO Green Book = ‘A Policy on Geometric Design of Highways and Streets’.”},
{id:“t4”,cat:“Transportation”,mode:“conceptual”,diff:“Medium”,q:“LOS F represents:”,opts:[“A. Free flow”,“B. Stable flow at capacity”,“C. Forced flow — breakdown, stop-and-go”,“D. Unstable flow near capacity”],ans:“C”,exp:“LOS F = forced or breakdown flow — demand exceeds capacity.”},
{id:“t5”,cat:“Transportation”,mode:“computational”,diff:“Easy”,q:“Speed = 60 mph, perception-reaction = 2.5 s. Reaction distance:”,opts:[“A. 88 ft”,“B. 132 ft”,“C. 176 ft”,“D. 220 ft”],ans:“D”,exp:“d = 88 fps × 2.5 s = 220 ft  (60 mph = 88 ft/s)”,formula:“d = v × t”},
{id:“t6”,cat:“Transportation”,mode:“computational”,diff:“Medium”,q:“V=60 mph, e=0.08, f=0.12. Minimum radius R:”,opts:[“A. 500 ft”,“B. 1,000 ft”,“C. 1,200 ft”,“D. 2,000 ft”],ans:“C”,exp:“R = V²/[15(e+f)] = 3600/[15×0.20] = 1,200 ft”,formula:“R = V²/[15(e+f)]”},
{id:“t7”,cat:“Transportation”,mode:“computational”,diff:“Medium”,q:“Flow = 1,200 veh/hr, speed = 40 mph. Traffic density:”,opts:[“A. 15 veh/mi”,“B. 30 veh/mi”,“C. 48,000 veh/mi”,“D. 1 veh/mi”],ans:“B”,exp:“k = q/u = 1200/40 = 30 veh/mi”,formula:“k = q/u”},
{id:“t8”,cat:“Transportation”,mode:“conceptual”,diff:“Medium”,q:“AADT is:”,opts:[“A. Peak hour volume”,“B. Total annual volume / 365”,“C. Design hour volume”,“D. Max monthly volume”],ans:“B”,exp:“AADT = total annual two-directional traffic / 365 days.”},
// WATER RESOURCES
{id:“w1”,cat:“Water Resources”,mode:“conceptual”,diff:“Easy”,q:“Manning’s equation calculates:”,opts:[“A. Groundwater flow”,“B. Open channel flow velocity”,“C. Pipe pressure loss”,“D. Wave height”],ans:“B”,exp:“Manning’s V=(1/n)R^(2/3)S^(1/2) applies to open channel (gravity) flow.”},
{id:“w2”,cat:“Water Resources”,mode:“conceptual”,diff:“Easy”,q:“Q = VA (continuity equation) states:”,opts:[“A. Pressure × area = constant”,“B. Flow rate = velocity × cross-sectional area”,“C. Energy is conserved”,“D. Head loss ∝ velocity”],ans:“B”,exp:“Q = VA: volume flow rate = velocity × cross-sectional area.”},
{id:“w3”,cat:“Water Resources”,mode:“conceptual”,diff:“Medium”,q:“Rational Method Q = CiA estimates:”,opts:[“A. Groundwater recharge”,“B. Peak stormwater runoff”,“C. Evapotranspiration”,“D. Base flow”],ans:“B”,exp:“C=runoff coeff, i=intensity, A=drainage area — peak runoff from small watersheds.”},
{id:“w4”,cat:“Water Resources”,mode:“conceptual”,diff:“Hard”,q:“A hydraulic jump transitions flow from:”,opts:[“A. Subcritical to supercritical”,“B. Supercritical to subcritical”,“C. Laminar to turbulent”,“D. Pressurized to open channel”],ans:“B”,exp:“Hydraulic jump: abrupt Fr>1 to Fr<1 transition with significant energy loss.”},
{id:“w5”,cat:“Water Resources”,mode:“conceptual”,diff:“Easy”,q:“100-year storm annual probability of exceedance:”,opts:[“A. 1%”,“B. 10%”,“C. 0.1%”,“D. 100%”],ans:“A”,exp:“T=1/P → 100-yr storm: P=1/100=1% annual probability.”},
{id:“w6”,cat:“Water Resources”,mode:“conceptual”,diff:“Easy”,q:“BOD measures:”,opts:[“A. Dissolved oxygen in stream”,“B. Oxygen consumed by biological activity”,“C. Water hardness”,“D. pH of wastewater”],ans:“B”,exp:“BOD = oxygen consumed by microorganisms breaking down organic matter.”},
{id:“w7”,cat:“Water Resources”,mode:“computational”,diff:“Easy”,q:“Pipe D=12 in, V=4 fps. Flow rate Q:”,opts:[“A. 3.14 cfs”,“B. 6.28 cfs”,“C. 12.6 cfs”,“D. 1.57 cfs”],ans:“A”,exp:“A=π(0.5)²=0.785 ft². Q=4×0.785=3.14 cfs”,formula:“Q = V×A,  A = πD²/4”},
{id:“w8”,cat:“Water Resources”,mode:“computational”,diff:“Medium”,q:“Manning’s n=0.013, R=1.5 ft, S=0.001. Velocity V:”,opts:[“A. 2.1 fps”,“B. 3.5 fps”,“C. 4.7 fps”,“D. 6.1 fps”],ans:“C”,exp:“V=(1.486/0.013)×1.5^0.667×0.001^0.5≈4.7 fps”,formula:“V = (1.486/n)R^(2/3)S^(1/2)”},
// CONSTRUCTION
{id:“c1”,cat:“Construction”,mode:“conceptual”,diff:“Easy”,q:“Critical path in CPM:”,opts:[“A. Costs the most”,“B. Determines shortest project completion time with zero float”,“C. Has the most float”,“D. Uses the most labor”],ans:“B”,exp:“Critical path = longest path through network = minimum project duration. Zero total float.”},
{id:“c2”,cat:“Construction”,mode:“conceptual”,diff:“Medium”,q:“Total float is:”,opts:[“A. Time saved by overtime”,“B. Max delay without delaying project completion”,“C. Extra budget”,“D. Activity duration”],ans:“B”,exp:“Float = LS−ES. How much an activity can slip without affecting the end date.”},
{id:“c3”,cat:“Construction”,mode:“conceptual”,diff:“Easy”,q:“A performance bond guarantees:”,opts:[“A. Payment to subcontractors”,“B. Project completion by contractor”,“C. Bid price validity”,“D. Material quality”],ans:“B”,exp:“Performance bond guarantees contractor completes the project.”},
{id:“c4”,cat:“Construction”,mode:“conceptual”,diff:“Medium”,q:“Contract type with MOST risk on contractor:”,opts:[“A. Cost plus fixed fee”,“B. Cost plus percentage”,“C. Lump sum (fixed price)”,“D. Unit price”],ans:“C”,exp:“Lump sum: contractor absorbs all cost overruns — maximum contractor risk.”},
{id:“c5”,cat:“Construction”,mode:“conceptual”,diff:“Easy”,q:“OSHA fall protection in construction required at:”,opts:[“A. 4 ft”,“B. 6 ft”,“C. 8 ft”,“D. 10 ft”],ans:“B”,exp:“OSHA: 6 ft in construction, 4 ft in general industry.”},
{id:“c6”,cat:“Construction”,mode:“conceptual”,diff:“Medium”,q:“Compaction typically specified as % of:”,opts:[“A. In-situ density”,“B. Max dry unit weight from Proctor test”,“C. Saturated unit weight”,“D. Specific gravity”],ans:“B”,exp:“Compaction spec: e.g., 95% of max dry unit weight from Proctor.”},
{id:“c7”,cat:“Construction”,mode:“conceptual”,diff:“Hard”,q:“CPI (Cost Performance Index) in EVM:”,opts:[“A. PV/AC”,“B. EV/AC”,“C. AC/PV”,“D. EV/PV”],ans:“B”,exp:“CPI=EV/AC. >1=under budget; <1=over budget. SPI=EV/PV.”},
{id:“c8”,cat:“Construction”,mode:“conceptual”,diff:“Easy”,q:“Sheeting and shoring in excavations primarily:”,opts:[“A. Improves bearing capacity”,“B. Prevents cave-ins and protects workers”,“C. Dewaters excavation”,“D. Compacts subgrade”],ans:“B”,exp:“OSHA requires protective systems to prevent trench/excavation cave-ins.”},
// ENVIRONMENTAL
{id:“ev1”,cat:“Environmental”,mode:“conceptual”,diff:“Easy”,q:“Primary wastewater treatment removes:”,opts:[“A. Dissolved nutrients”,“B. Suspended solids by physical settling”,“C. Pathogens”,“D. BOD”],ans:“B”,exp:“Primary treatment uses sedimentation to physically remove suspended solids.”},
{id:“ev2”,cat:“Environmental”,mode:“conceptual”,diff:“Medium”,q:“Activated sludge is:”,opts:[“A. Primary treatment”,“B. Tertiary treatment”,“C. Secondary biological treatment”,“D. Disinfection”],ans:“C”,exp:“Activated sludge uses microorganisms to degrade dissolved organics — secondary treatment.”},
{id:“ev3”,cat:“Environmental”,mode:“conceptual”,diff:“Easy”,q:“NPDES permits cover:”,opts:[“A. Underground storage tanks”,“B. Point source discharges to navigable waters”,“C. Air emissions”,“D. Hazardous waste disposal”],ans:“B”,exp:“NPDES regulates point source discharges under the Clean Water Act.”},
{id:“ev4”,cat:“Environmental”,mode:“conceptual”,diff:“Hard”,q:“Eutrophication most commonly caused by:”,opts:[“A. Excess dissolved oxygen”,“B. Excess nitrogen and phosphorus”,“C. Suspended sediment”,“D. pH reduction”],ans:“B”,exp:“Excess N and P cause algal blooms, depleting DO and harming aquatic life.”},
{id:“ev5”,cat:“Environmental”,mode:“conceptual”,diff:“Easy”,q:“Chlorination of drinking water:”,opts:[“A. Removes hardness”,“B. Disinfects and kills pathogens”,“C. Adjusts pH”,“D. Removes iron”],ans:“B”,exp:“Chlorination = primary disinfection method for drinking water.”},
// SURVEYING
{id:“sv1”,cat:“Surveying”,mode:“conceptual”,diff:“Easy”,q:“A benchmark is:”,opts:[“A. A measured horizontal distance”,“B. A point of known elevation used as reference”,“C. A property corner”,“D. A GPS control point”],ans:“B”,exp:“Benchmark = permanent reference point of known elevation for leveling.”},
{id:“sv2”,cat:“Surveying”,mode:“computational”,diff:“Easy”,q:“HI=105.42 ft, foresight rod=3.21 ft. Unknown elevation:”,opts:[“A. 102.21 ft”,“B. 108.63 ft”,“C. 105.42 ft”,“D. 108.21 ft”],ans:“A”,exp:“Elev = HI − FS = 105.42 − 3.21 = 102.21 ft”,formula:“Elev = HI − Foresight”},
{id:“sv3”,cat:“Surveying”,mode:“conceptual”,diff:“Medium”,q:“A Total Station combines:”,opts:[“A. Level and rod”,“B. Electronic theodolite and EDM”,“C. GPS and compass”,“D. Planimeter and level”],ans:“B”,exp:“Total Station = electronic theodolite (angles) + EDM (distances).”},
{id:“sv4”,cat:“Surveying”,mode:“computational”,diff:“Medium”,q:“Bearing N 45° E as azimuth:”,opts:[“A. 45°”,“B. 135°”,“C. 225°”,“D. 315°”],ans:“A”,exp:“N 45° E = azimuth 45°. N 45° W = 315°; S 45° E = 135°.”,formula:“NE=bearing; SE=180°−bearing; SW=180°+bearing; NW=360°−bearing”},
{id:“sv5”,cat:“Surveying”,mode:“conceptual”,diff:“Easy”,q:“A backsight is taken on:”,opts:[“A. Unknown elevation point”,“B. A point of known elevation”,“C. A turning point ahead”,“D. Benchmark only”],ans:“B”,exp:“Backsight (BS) on known elevation establishes Height of Instrument (HI).”},
// PROJECT MANAGEMENT

{id:“pm2”,cat:“Project Management”,mode:“conceptual”,diff:“Medium”,q:“SPI > 1.0 means:”,opts:[“A. Over budget”,“B. Behind schedule”,“C. Ahead of schedule”,“D. At risk”],ans:“C”,exp:“SPI=EV/PV. SPI>1=ahead of schedule. CPI>1=under budget.”},

function getQs(cat,mode,diff,count){
var pool = QB.slice();
if(cat !== ‘All Topics’) pool = pool.filter(function(q){ return q.cat===cat; });
if(mode !== ‘both’) pool = pool.filter(function(q){ return q.mode===mode; });
if(diff !== ‘Mixed’) pool = pool.filter(function(q){ return q.diff===diff; });
pool.sort(function(){ return Math.random()-0.5; });
return pool.slice(0,count);
}

async function fetchAI(cat,mode,diff,count){
var topic = cat===‘All Topics’ ? ‘all Civil FE subjects’ : cat;
var prompt = ‘Generate ‘+count+’ ‘+mode+’ Civil FE exam questions on ‘+topic+’. ‘+(diff===‘Mixed’?‘Mix difficulties.’:diff+’ level.’)+’ ‘+(mode===‘conceptual’?‘NO math. Definitions, principles, codes.’:‘Require calculation. Core formulas. 1-2 steps.’)+’ Return ONLY raw JSON: [{“q”:”…”,“opts”:[“A. …”,“B. …”,“C. …”,“D. …”],“ans”:“A”,“exp”:”…”,“cat”:”’+cat+’”,“diff”:“Medium”,“formula”:null}]’;
var res = await fetch(‘https://api.anthropic.com/v1/messages’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:3000,messages:[{role:‘user’,content:prompt}]})});
var data = await res.json();
var text = (data.content||[]).map(function(b){ return b.text||’’; }).join(’’);
var match = text.match(/[[\s\S]*]/);
if(!match) throw new Error(‘No JSON’);
return JSON.parse(match[0]).map(function(q){ return Object.assign({},q,{id:‘ai-’+Math.random(),mode:mode}); });
}

else if(S.screen===‘loading’){
h.push(’<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;"><div class="spin"></div><p style="color:var(--tx2);font-size:14px;">Generating questions…</p></div>’);
}

else if(S.screen===‘quiz’){
var q = S.questions[S.current];
if(!q){ S.screen=‘home’; render(); return; }
var prog = S.current/S.questions.length*100;
var timedOut = S.selected===’**timeout**’;
var notes = getNotes();
var hasNote = !!notes[q.id];
h.push(’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="display:flex;gap:5px;align-items:center;"><span class="badge badge-y" style="font-size:10px;">’+(S.mode===‘conceptual’?‘Concept’:‘Calc’)+’</span>’+(S.flagged.indexOf(S.current)>=0?’<span style="font-size:11px;color:var(--red);">🚩</span>’:’’)+(hasNote?’<span style="font-size:11px;color:var(--acc);">📝</span>’:’’)+’</div><div style="display:flex;gap:8px;align-items:center;">’+(S.streak>=2?’<span class="streak">🔥’+S.streak+’</span>’:’’)+(S.timer>0&&S.selected===null?’<span class="timer-num'+(S.timeLeft<=10?' timer-warn':'')+'" id="tmr">’+S.timeLeft+‘s</span>’:’’)+’<span style="font-size:13px;color:var(--tx2);font-weight:500;">’+(S.current+1)+’/’+S.questions.length+’</span></div></div>’);
h.push(’<div class="bar-bg"><div class="bar-fill" style="width:'+prog+'%;"></div></div>’);
if(q.formula && q.formula!==‘null’) h.push(’<div class="formula-box"><span style="font-size:9px;color:var(--tx3);font-family:sans-serif;text-transform:uppercase;letter-spacing:.08em;">Formula</span><br>’+q.formula+’</div>’);
h.push(’<div class="card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;gap:8px;"><p style="font-size:15px;font-weight:500;color:var(--tx);line-height:1.65;flex:1;">’+q.q+’</p><div style="display:flex;flex-direction:column;gap:6px;"><button onclick="toggleFlag()" style="background:none;border:none;cursor:pointer;font-size:15px;opacity:.5;">🚩</button><button onclick="S.modal=\'note\';render()" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;">📝</button></div></div></div>’);
if(timedOut) h.push(’<div class="err" style="margin-bottom:10px;">⏱ Time's up! Correct: ‘+q.ans+’</div>’);
q.opts.forEach(function(opt){
var letter=opt.charAt(0), cls=‘opt’;
if(S.selected!==null && !timedOut){ if(letter===q.ans) cls+=’ correct’; else if(opt===S.selected) cls+=’ wrong’; }
else if(opt===S.selected) cls+=’ selected’;
h.push(’<button class=”’+cls+’” ‘+(S.selected!==null?‘disabled’:’’)+’ onclick=“pickOpt('’+opt.replace(/’/g,”\’”).replace(/”/g,’"’)+’')”>’+opt+’</button>’);
});
if(S.selected && !timedOut) h.push(’<div class="explain"><p>💡 ‘+q.exp+’</p></div>’);
if(S.selected!==null && !S.confRatings[S.current]){
h.push(’<p style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:8px;">How confident? <span style="font-weight:400;opacity:.6;">(optional)</span></p>’);
h.push(’<div class="conf-row">’+CONF.map(function(c){ return ‘<button class="conf-btn" style="border-color:'+c.c+'55;color:'+c.c+';" onclick="pickConf(\''+c.l+'\')">’+c.l+’</button>’; }).join(’’)+’</div>’);
}
if(S.selected!==null) h.push(’<button class="btn" onclick="nextQ()">’+(S.current+1<S.questions.length?‘Next →’:‘See Results →’)+’</button>’);
h.push(’<button style="width:100%;padding:10px;border-radius:12px;border:1px solid var(--brd);background:transparent;color:var(--tx2);font-size:13px;cursor:pointer;" onclick="S.modal=\'exit\';render()">← Home</button>’);
}

else if(S.screen===‘results’){
var total=S.answers.length, correct=S.answers.filter(function(a){ return a.correct; }).length;
var pct=Math.round(correct/total*100);
h.push(’<div style="text-align:center;margin-bottom:22px;"><div style="font-size:28px;margin-bottom:10px;">’+(pct>=70?‘🎉’:pct>=50?‘📚’:‘💪’)+’</div><div class="score-big">’+correct+’<span style="font-size:22px;color:var(--tx3);">/’+total+’</span></div><p style="color:var(--tx2);font-size:14px;margin:6px 0 10px;">’+pct+’%</p><span class="badge '+(pct>=70?'badge-g':'badge-r')+'">’+(pct>=70?‘Pass ✓’:‘Keep Studying’)+’</span>’+(S.bestStreak>=3?’<p style="font-size:12px;color:var(--acc);margin-top:8px;">🔥 Best streak: ‘+S.bestStreak+’</p>’:’’)+’</div>’);
h.push(’<div class="card" style="margin-bottom:12px;"><p style="font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">By category</p>’);
Object.keys(S.sessionStats).sort(function(a,b){ return (S.sessionStats[a].c/S.sessionStats[a].t)-(S.sessionStats[b].c/S.sessionStats[b].t); }).forEach(function(cat){
var v=S.sessionStats[cat], p=Math.round(v.c/v.t*100), col=p>=70?‘var(–green)’:p>=50?‘var(–acc)’:‘var(–red)’;
h.push(’<div class="weak-row"><span style="font-size:13px;color:var(--tx);flex:1;">’+cat+’</span><div class="weak-bar-bg"><div style="height:4px;width:'+p+'%;background:'+col+';border-radius:99px;"></div></div><span style="font-size:12px;color:'+col+';font-weight:600;margin-left:8px;">’+p+’%</span></div>’);
});
h.push(’</div><details style="margin-bottom:14px;"><summary style="font-size:13px;font-weight:600;color:var(--tx);cursor:pointer;padding:10px 0;list-style:none;">▶ Review all questions (’+total+’)</summary><div style="margin-top:10px;">’);
S.answers.forEach(function(a,i){
var cr=S.confRatings[i], col=cr===‘Got it’?‘var(–green)’:cr===‘Shaky’?‘var(–acc)’:‘var(–red)’;
h.push(’<div class="'+(a.correct?'review-ok':'review-ng')+'"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:#555;">Q’+(i+1)+’ · ‘+a.cat+(S.flagged.indexOf(i)>=0?’ 🚩’:’’)+’</span><div style="display:flex;gap:5px;">’+(cr?’<span style="font-size:10px;color:'+col+';">’+cr+’</span>’:’’)+’<span style="font-size:11px;font-weight:600;color:'+(a.timedOut?'var(--acc)':a.correct?'var(--green)':'var(--red)')+';">’+(a.timedOut?‘⏱’:a.correct?‘✓’:‘✗’)+’</span></div></div>’+(a.formula&&a.formula!==‘null’?’<p style="font-family:monospace;font-size:12px;color:var(--acc);margin-bottom:4px;">’+a.formula+’</p>’:’’)+’<p style="font-size:13px;color:var(--tx);margin-bottom:4px;line-height:1.5;">’+a.q+’</p>’+((!a.correct&&a.selected)?’<p style="font-size:12px;color:var(--red);margin-bottom:3px;">Your: ‘+a.selected+’</p>’:’’)+’<p style="font-size:12px;color:var(--green);">✓ ‘+a.ans+’ — ‘+a.exp+’</p></div>’);
});
h.push(’</div></details><div style="display:flex;gap:8px;"><button class="btn-sec" onclick="S.tab=\'stats\';S.screen=\'home\';render()">Stats</button><button class="btn-sec" onclick="S.screen=\'home\';S.tab=\'quiz\';render()">← Home</button><button class="btn" style="flex:1;" onclick="startQuiz()">Retake ↺</button></div>’);
}

app.innerHTML = h.join(’’);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function startQuiz(){
S.error=’’; S.answers=[]; S.current=0; S.selected=null;
S.streak=0; S.bestStreak=0; S.flagged=[]; S.confRatings={}; S.sessionStats={};
var qs = getQs(S.cat, S.mode, S.diff, S.count);
if(qs.length < S.count){
try{
S.screen=‘loading’; render();
var ai = await fetchAI(S.cat, S.mode, S.diff, S.count);
qs = qs.concat(ai).slice(0, S.count);
}catch(e){
if(!qs.length){ S.error=‘Not enough questions. Try broader settings.’; S.screen=‘home’; render(); return; }
}
}
S.questions = qs;
S.screen = ‘quiz’;
render();
startTimer();
}

function startTimer(){
clearInterval(S.timerInterval);
if(!S.timer) return;
S.timeLeft = S.timer;
S.timerInterval = setInterval(function(){
S.timeLeft–;
var el = document.getElementById(‘tmr’);
if(el){ el.textContent = S.timeLeft+‘s’; if(S.timeLeft<=10) el.classList.add(‘timer-warn’); }
if(S.timeLeft<=0){ clearInterval(S.timerInterval); S.selected=’**timeout**’; render(); }
}, 1000);
}

function pickOpt(opt){
if(S.selected!==null) return;
clearInterval(S.timerInterval);
S.selected = opt;
render();
}

function pickConf(c){
S.confRatings[S.current] = c;
render();
}

function toggleFlag(){
var idx = S.flagged.indexOf(S.current);
if(idx>=0) S.flagged.splice(idx,1);
else S.flagged.push(S.current);
render();
}

function nextQ(){
var q = S.questions[S.current];
var sel = S.selected===’**timeout**’ ? null : S.selected;
var correct = sel ? sel.charAt(0)===q.ans : false;
var ns = correct ? S.streak+1 : 0;
S.streak = ns;
if(ns > S.bestStreak) S.bestStreak = ns;
var cat = q.cat;
var prev = S.sessionStats[cat]||{c:0,t:0};
S.sessionStats[cat] = {c:prev.c+(correct?1:0), t:prev.t+1};
updateAllStats(cat, correct);
S.answers.push({q:q.q, opts:q.opts, ans:q.ans, exp:q.exp, formula:q.formula||null, cat:q.cat, selected:sel, correct:correct, timedOut:S.selected===’**timeout**’});
if(S.current+1 < S.questions.length){
S.current++; S.selected=null; render(); startTimer();
} else {
saveSession(S.answers.filter(function(a){ return a.correct; }).length, S.answers.length, S.mode, S.cat);
S.screen=‘results’; render();
}
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
try {
render();
} catch(e) {
var app = document.getElementById(‘app’);
if(app) app.innerHTML = ‘<div style="padding:40px 20px;text-align:center;"><p style="color:#f5c518;font-size:16px;margin-bottom:8px;">⚠️ Error loading app</p><p style="color:#888;font-size:13px;margin-bottom:20px;">’+e.message+’</p><button onclick="location.reload()" style="padding:12px 24px;background:#f5c518;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">Reload</button></div>’;
}
</script>
