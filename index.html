<!-- FE Civil Mastery v5.0 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FE Civil">
<title>FE Civil Mastery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#e5e5e5;min-height:100vh}
body.light{background:#f0f0e8;color:#1a1a1a}
.app{padding:20px 16px 80px;max-width:520px;margin:0 auto;position:relative;z-index:1}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.card{background:rgba(22,22,22,0.96);border:1px solid #2a2a2a;border-radius:16px;padding:18px;margin-bottom:12px}
body.light .card{background:rgba(255,255,255,0.96);border-color:#ddd}
.lbl{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block}
body.light .lbl{color:#aaa}
select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #2a2a2a;background:#111;color:#e5e5e5;font-size:14px;outline:none;appearance:none;font-family:inherit}
body.light select{background:#fafafa;color:#1a1a1a;border-color:#ddd}
.seg{display:flex;background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:4px;margin-bottom:12px}
body.light .seg{background:#f0f0f0;border-color:#ddd}
.seg button{flex:1;padding:9px 8px;border-radius:9px;border:none;background:transparent;color:#666;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.seg button.on{background:#f5c518;color:#000}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sb{padding:9px 0;border-radius:10px;border:1px solid #2a2a2a;background:#111;color:#888;font-size:13px;cursor:pointer;text-align:center;font-family:inherit}
body.light .sb{background:#fafafa;border-color:#ddd;color:#999}
.sb.on{border-color:#f5c518;background:#1a1600;color:#f5c518}
body.light .sb.on{background:#fffbe6;color:#9a7800}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:#f5c518;color:#000;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn2{padding:11px;border-radius:12px;border:1px solid #2a2a2a;background:#1a1a1a;color:#888;font-size:13px;cursor:pointer;font-family:inherit}
body.light .btn2{background:#fff;border-color:#ddd;color:#888}
.tabs{display:flex;background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:4px;margin-bottom:14px}
body.light .tabs{background:#f0f0f0;border-color:#ddd}
.tabs button{flex:1;padding:9px 4px;border-radius:9px;border:none;background:transparent;color:#555;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit}
body.light .tabs button{color:#aaa}
.tabs button.on{background:#f5c518;color:#000}
.opt{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2a2a2a;background:#111;color:#ccc;font-size:14px;text-align:left;cursor:pointer;margin-bottom:7px;line-height:1.4;display:block;font-family:inherit}
body.light .opt{background:#fafafa;border-color:#ddd;color:#333}
.opt.ok{border-color:#22c55e;background:#0d2b1d;color:#86efac}
.opt.ng{border-color:#ef4444;background:#2b0d0d;color:#fca5a5}
.opt.sel{border-color:#f5c518;background:#1a1600;color:#f5c518}
body.light .opt.ok{background:#dcfce7;color:#14532d}
body.light .opt.ng{background:#fee2e2;color:#991b1b}
body.light .opt.sel{background:#fffbe6;color:#78570a}
.bar{height:4px;background:#2a2a2a;border-radius:99px;margin-bottom:16px}
body.light .bar{background:#e0e0e0}
.barfill{height:4px;background:#f5c518;border-radius:99px;transition:width .3s}
.explain{background:#131100;border:1px solid #3a3000;border-left:3px solid #f5c518;border-radius:10px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:#d4a800;line-height:1.6}
body.light .explain{background:#fffbe6;border-color:#f5d060;color:#78570a}
.fbox{background:#111;border:1px solid #3a3000;border-left:3px solid #f5c518;border-radius:10px;padding:9px 13px;margin-bottom:10px;font-family:monospace;font-size:13px;color:#f5c518;line-height:1.7}
body.light .fbox{background:#fafafa;color:#8a6800}
.spin{width:38px;height:38px;border:3px solid #2a2a2a;border-top-color:#f5c518;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.big{font-size:52px;font-weight:600;color:#f5c518;line-height:1}
.rok{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #14532d;background:#0a1f15}
.rng{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #7f1d1d;background:#1f0a0a}
body.light .rok{background:#f0fdf4;border-color:#bbf7d0}
body.light .rng{background:#fff1f2;border-color:#fecdd3}
.hr{height:1px;background:#2a2a2a;margin:12px 0}
body.light .hr{background:#e0e0e0}
.wr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a1a}
body.light .wr{border-bottom-color:#eee}
.wbar{width:70px;height:4px;background:#2a2a2a;border-radius:99px;overflow:hidden}
body.light .wbar{background:#e0e0e0}
.conf{display:flex;gap:7px;margin-bottom:10px}
.conf button{flex:1;padding:9px 4px;border-radius:10px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;background:transparent;font-family:inherit}
.fcard{background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:12px 14px;margin-bottom:7px}
body.light .fcard{background:#fafafa;border-color:#ddd}
.streak{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:#1a1600;border:1px solid #3a3000;font-size:12px;font-weight:600;color:#f5c518}
.tmr{font-size:15px;font-weight:600;color:#f5c518}
.tmr.red{color:#ef4444}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:24px;width:100%;max-width:340px}
body.light .mbox{background:#fff;border-color:#ddd}
.tbtn{position:fixed;top:14px;right:14px;z-index:100;padding:7px 13px;border-radius:99px;border:1px solid #2a2a2a;background:rgba(20,20,20,.95);color:#888;font-size:12px;cursor:pointer;font-family:inherit}
body.light .tbtn{background:rgba(255,255,255,.95);border-color:#ddd}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<button class="tbtn" id="tbtn" onclick="toggleTheme()">☀ Light</button>
<div class="app" id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px">
    <div class="spin"></div>
    <p style="color:#666;font-size:14px">Loading FE Civil Mastery…</p>

<script>
// ── THEME ─────────────────────────────────────────────────────────────────────
var dark = true;
try { dark = localStorage.getItem('theme') !== 'light'; } catch(e){}
function applyTheme() {
  document.body.classList.toggle('light', !dark);
  var b = document.getElementById('tbtn');
  if (b) b.textContent = dark ? '☀ Light' : '● Dark';
  drawBG();
}
function toggleTheme() {
  dark = !dark;
  try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e){}
  applyTheme();
  render();
}
applyTheme();

// ── BACKGROUND ────────────────────────────────────────────────────────────────
function drawBG() {
  var el = document.getElementById('bg');
  if (!el) return;
  var s = dark ? '#2a2a2a' : '#c0c0c0';
  var s2 = dark ? '#222' : '#d0d0d0';
  var p = [];
  // ground
  p.push('<line x1="0" y1="625" x2="1000" y2="625" stroke="'+s2+'" stroke-width="2"/>');
  for (var x = 0; x < 1000; x += 80) p.push('<line x1="'+(x+10)+'" y1="630" x2="'+(x+50)+'" y2="630" stroke="'+s2+'" stroke-width="1.2" stroke-dasharray="30,50"/>');
  // left building
  p.push('<rect x="30" y="300" width="110" height="325" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  for (var r = 0; r < 10; r++) for (var c = 0; c < 4; c++) p.push('<rect x="'+(42+c*24)+'" y="'+(312+r*28)+'" width="16" height="18" fill="none" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<rect x="55" y="585" width="60" height="40" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="85" y1="300" x2="85" y2="260" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="78" y1="270" x2="92" y2="270" stroke="'+s+'" stroke-width="1"/>');
  // mid building
  p.push('<rect x="150" y="435" width="75" height="190" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  for (var r = 0; r < 6; r++) for (var c = 0; c < 3; c++) p.push('<rect x="'+(158+c*22)+'" y="'+(445+r*28)+'" width="14" height="18" fill="none" stroke="'+s+'" stroke-width="0.8"/>');
  // crane left
  p.push('<line x1="248" y1="625" x2="248" y2="180" stroke="'+s+'" stroke-width="2"/>');
  for (var i = 0; i < 8; i++) { var y = 230+i*50; if(i%2===0) p.push('<line x1="242" y1="'+y+'" x2="254" y2="'+(y+50)+'" stroke="'+s+'" stroke-width="0.8"/>'); else p.push('<line x1="254" y1="'+y+'" x2="242" y2="'+(y+50)+'" stroke="'+s+'" stroke-width="0.8"/>'); }
  p.push('<rect x="240" y="188" width="24" height="18" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="248" y1="192" x2="430" y2="192" stroke="'+s+'" stroke-width="2"/>');
  p.push('<line x1="248" y1="192" x2="190" y2="192" stroke="'+s+'" stroke-width="1.8"/>');
  p.push('<rect x="178" y="188" width="18" height="12" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="248" y1="175" x2="430" y2="192" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<line x1="248" y1="175" x2="190" y2="192" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<line x1="390" y1="192" x2="390" y2="250" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<path d="M385 250 Q390 260 395 250" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  // suspension bridge
  p.push('<rect x="350" y="618" width="300" height="8" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  p.push('<rect x="372" y="535" width="12" height="88" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  p.push('<rect x="616" y="535" width="12" height="88" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  p.push('<path d="M350 562 Q500 502 650 562" fill="none" stroke="'+s+'" stroke-width="2"/>');
  for (var i = 0; i < 13; i++) { var hx = 380+i*20; var t = (hx-380)/240; var hy = 560-90*(1-(2*t-1)*(2*t-1)); p.push('<line x1="'+hx+'" y1="622" x2="'+hx+'" y2="'+hy+'" stroke="'+s+'" stroke-width="0.8"/>'); }
  p.push('<rect x="340" y="612" width="22" height="12" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<rect x="638" y="612" width="22" height="12" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  // crane right
  p.push('<line x1="740" y1="625" x2="740" y2="195" stroke="'+s+'" stroke-width="2"/>');
  for (var i = 0; i < 8; i++) { var y = 230+i*50; if(i%2===0) p.push('<line x1="734" y1="'+y+'" x2="746" y2="'+(y+50)+'" stroke="'+s+'" stroke-width="0.8"/>'); else p.push('<line x1="746" y1="'+y+'" x2="734" y2="'+(y+50)+'" stroke="'+s+'" stroke-width="0.8"/>'); }
  p.push('<rect x="732" y="203" width="24" height="18" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="740" y1="207" x2="580" y2="207" stroke="'+s+'" stroke-width="2"/>');
  p.push('<line x1="740" y1="207" x2="800" y2="207" stroke="'+s+'" stroke-width="1.8"/>');
  p.push('<rect x="800" y="203" width="18" height="12" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="740" y1="190" x2="580" y2="207" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<line x1="740" y1="190" x2="800" y2="207" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<line x1="612" y1="207" x2="612" y2="265" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<path d="M607 265 Q612 275 617 265" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  // right building
  p.push('<rect x="790" y="345" width="95" height="280" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  for (var r = 0; r < 9; r++) for (var c = 0; c < 3; c++) p.push('<rect x="'+(800+c*26)+'" y="'+(355+r*28)+'" width="18" height="18" fill="none" stroke="'+s+'" stroke-width="0.8"/>');
  p.push('<line x1="837" y1="345" x2="837" y2="305" stroke="'+s+'" stroke-width="1.2"/>');
  // far right building
  p.push('<rect x="895" y="465" width="70" height="160" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  for (var r = 0; r < 5; r++) for (var c = 0; c < 2; c++) p.push('<rect x="'+(904+c*28)+'" y="'+(475+r*28)+'" width="18" height="18" fill="none" stroke="'+s+'" stroke-width="0.8"/>');
  // beam diagram top left
  p.push('<line x1="30" y1="130" x2="200" y2="130" stroke="'+s+'" stroke-width="2"/>');
  p.push('<polygon points="30,130 20,148 40,148" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<polygon points="200,130 190,148 210,148" fill="none" stroke="'+s+'" stroke-width="1.2"/>');
  for (var bx = 50; bx <= 190; bx += 20) { p.push('<line x1="'+bx+'" y1="110" x2="'+bx+'" y2="128" stroke="'+s+'" stroke-width="0.9"/>'); p.push('<polygon points="'+bx+',130 '+(bx-3)+',122 '+(bx+3)+',122" fill="'+s+'"/>'); }
  p.push('<line x1="50" y1="110" x2="190" y2="110" stroke="'+s+'" stroke-width="1"/>');
  // survey instrument
  p.push('<rect x="28" y="50" width="66" height="26" fill="none" stroke="'+s+'" stroke-width="1.4" rx="4"/>');
  p.push('<circle cx="61" cy="63" r="7" fill="none" stroke="'+s+'" stroke-width="1"/>');
  p.push('<line x1="61" y1="76" x2="61" y2="98" stroke="'+s+'" stroke-width="1.4"/>');
  p.push('<line x1="43" y1="98" x2="79" y2="98" stroke="'+s+'" stroke-width="1.4"/>');
  p.push('<line x1="61" y1="98" x2="38" y2="130" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="61" y1="98" x2="61" y2="133" stroke="'+s+'" stroke-width="1.2"/>');
  p.push('<line x1="61" y1="98" x2="84" y2="130" stroke="'+s+'" stroke-width="1.2"/>');
  // topo lines top right
  var tlines = ['M820 75 Q840 65 865 73 Q888 81 908 70 Q928 59 945 67','M820 90 Q842 79 867 88 Q890 97 912 85 Q932 74 945 82','M820 105 Q844 94 869 103 Q893 113 915 101 Q935 91 945 97'];
  for (var ti = 0; ti < tlines.length; ti++) p.push('<path d="'+tlines[ti]+'" fill="none" stroke="'+s+'" stroke-width="0.9"/>');
  // boring log far right
  p.push('<rect x="955" y="300" width="38" height="195" fill="none" stroke="'+s+'" stroke-width="1"/>');
  p.push('<text x="974" y="295" text-anchor="middle" font-size="8" fill="'+s+'" font-family="monospace">B-1</text>');
  for (var bl of [340,385,445]) p.push('<line x1="955" y1="'+bl+'" x2="993" y2="'+bl+'" stroke="'+s+'" stroke-width="0.8"/>');
  // retaining wall bottom left
  p.push('<rect x="0" y="562" width="28" height="63" fill="none" stroke="'+s+'" stroke-width="1.5"/>');
  for (var pi = 0; pi < 4; pi++) { var py = 570+pi*16; p.push('<line x1="28" y1="'+py+'" x2="46" y2="'+py+'" stroke="'+s+'" stroke-width="0.9"/>'); }
  el.innerHTML = '<svg width="100%" height="100%" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">'+p.join('')+'</svg>';
}

// ── QUESTION BANK ─────────────────────────────────────────────────────────────
var QB = [
  // ETHICS
  ["e1","Ethics","c","E","Under NSPE Code of Ethics, an engineer's paramount obligation is to:","A. Serve client finances|B. Hold public safety paramount|C. Keep all data confidential|D. Minimize project costs","B","First canon of NSPE: hold public safety, health, and welfare paramount.",""],
  ["e2","Ethics","c","E","An engineer discovers a design flaw after construction begins. The MOST ethical action:","A. Correct in next phase|B. Notify client and stop if dangerous|C. Document and proceed|D. Tell contractor only","B","Engineers must notify responsible parties and halt work posing safety risks.",""],
  ["e3","Ethics","c","M","An engineer can seal plans prepared by another when:","A. Both hold PE in same state|B. Engineer reviews and takes full responsibility|C. Client authorizes it|D. Plans are minor","B","A PE may seal work they reviewed and took professional responsibility for — not rubber-stamp.",""],
  ["e4","Ethics","c","M","Which is NOT a conflict of interest requiring disclosure?","A. Stock in specified supplier|B. Related to bidding contractor|C. Same university as client|D. On board regulating project","C","Attending the same school is not a financial or fiduciary conflict.",""],
  ["e5","Ethics","c","E","Advertising engineering services falsely or misleadingly is:","A. Permitted if it attracts clients|B. A violation of professional ethics|C. Prohibited only for public work|D. Allowed with client consent","B","NSPE prohibits false, misleading, or deceptive advertising.",""],
  ["e6","Ethics","c","M","'Responsible charge' means:","A. Financial liability|B. Direct control and personal supervision|C. Reviewing drawings before sealing|D. Signing contracts","B","Responsible charge = direct control and supervision — not just reviewing final product.",""],
  ["e7","Ethics","c","E","An engineer shall not reveal confidential client info without:","A. Payment|B. Client consent unless required by law|C. State board approval|D. Senior review","B","Confidentiality maintained unless client consents or law requires disclosure.",""],
  ["e8","Ethics","c","M","A PE allowing a non-licensed person to use their seal faces:","A. Written warning only|B. License revocation and legal penalties|C. OK if person is EIT|D. OK for small projects","B","Seal misuse: revocation, fines, and criminal charges.",""],
  ["e9","Ethics","c","M","'Sustainable development' in engineering ethics means:","A. Minimizing cost|B. Meeting present needs without compromising future generations|C. Using only recycled materials|D. Designing for 100-year life","B","Brundtland definition: present needs without compromising future generations.",""],
  ["e10","Ethics","c","H","If engineer believes project violates safety but employer disagrees, first action:","A. Report to authorities|B. Resign|C. Notify employer in writing|D. Proceed and note objection","C","Document formally with employer first; escalate only if unresolved.",""],
  // GEOTECHNICAL
  ["g1","Geotechnical","c","E","Effective stress in soil equals:","A. Total stress minus pore pressure|B. Total stress plus pore pressure|C. Stress at failure|D. Stress at surface","A","σ' = σ − u. Controls shear strength and consolidation.",""],
  ["g2","Geotechnical","c","E","USCS: soil with more than 50% passing No. 200 sieve is:","A. Gravel|B. Sand|C. Fine-grained|D. Organic","C","USCS: >50% passing #200 = fine-grained (silt or clay).",""],
  ["g3","Geotechnical","c","M","Active earth pressure develops when retaining wall:","A. Pushed into soil|B. Moves away from backfill|C. Completely rigid|D. Founded on rock","B","Active pressure forms when wall moves away, allowing lateral soil expansion.",""],
  ["g4","Geotechnical","c","E","Proctor compaction test determines:","A. Shear strength vs depth|B. Dry unit weight vs moisture content|C. Permeability vs void ratio|D. Settlement vs time","B","Proctor finds optimum moisture content for maximum dry unit weight.",""],
  ["g5","Geotechnical","c","M","OCR > 1 means the soil:","A. Never been loaded|B. Previously subjected to greater effective stress|C. At maximum past pressure|D. Has high liquid limit","B","OCR = σ'p/σ'v0 > 1 → overconsolidated.",""],
  ["g6","Geotechnical","c","H","Critical hydraulic gradient in soil occurs when:","A. Flow exceeds erosion velocity|B. Effective stress equals zero — piping/heave|C. Permeability > 10⁻² cm/s|D. Pore pressure = atmospheric","B","ic = γ'/γw. Upward gradient = ic → effective stress → 0 → piping.",""],
  ["g7","Geotechnical","c","E","PI = 0 means the soil is:","A. Highly plastic clay|B. Non-plastic|C. Expansive clay|D. Organic","B","PI = LL − PL = 0 → no plastic range.",""],
  ["g8","Geotechnical","c","M","Liquefaction risk is highest in:","A. Dense gravel|B. Loose saturated sand under seismic loading|C. Stiff clay|D. Dry cohesionless soil","B","Liquefaction: loose, saturated, cohesionless soils under cyclic loading.",""],
  ["g9","Geotechnical","n","E","Total unit weight = 120 pcf, water content = 20%. Dry unit weight:","A. 96 pcf|B. 100 pcf|C. 110 pcf|D. 144 pcf","B","γd = γ/(1+w) = 120/1.20 = 100 pcf","γd = γ/(1+w)"],
  ["g10","Geotechnical","n","M","Ka for φ = 30°:","A. 0.17|B. 0.33|C. 0.50|D. 0.67","B","Ka = tan²(45−15) = tan²(30) = 0.333","Ka = tan²(45 − φ/2)"],

function pool(){
  var r=QB.slice();
  if(S.cat!=='All') r=r.filter(function(q){return q[1]===S.cat;});
  if(S.mode!=='both') r=r.filter(function(q){return q[2]===S.mode;});
  if(S.diff!=='Mixed') r=r.filter(function(q){return q[3]===S.diff[0];});
  r.sort(function(){return Math.random()-0.5;});
  return r.slice(0,S.count);
}

    a.innerHTML=h; return;
  }
  if(S.modal==='note'){
    var qid=S.qs[S.cur]?S.qs[S.cur][0]:'';
    var nv=getNotes()[qid]||'';
    h='<div class="modal"><div class="mbox"><p style="font-size:15px;font-weight:600;color:var(--tx,#e5e5e5);margin-bottom:10px;">My Note</p><textarea id="ni" style="width:100%;padding:10px;border-radius:10px;border:1px solid #2a2a2a;background:#111;color:#e5e5e5;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:80px;">'+esc(nv)+'</textarea><div style="display:flex;gap:8px;margin-top:10px;"><button class="btn2" style="flex:1;" onclick="S.modal=null;render()">Cancel</button><button class="btn" style="flex:1;margin-bottom:0;" onclick="saveNote(\''+esc(qid)+'\',document.getElementById(\'ni\').value);S.modal=null;render()">Save</button></div></div></div>';
    a.innerHTML=h; return;
  }

  if(S.screen==='home'){
    h+='<div style="text-align:center;margin-bottom:18px;"><div style="width:50px;height:50px;border-radius:14px;background:#1a1600;border:1px solid #3a3000;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;">📐</div><h1 style="font-size:21px;font-weight:600;">FE Civil Mastery</h1><p style="font-size:13px;color:#888;margin-top:3px;">Smart prep for the Civil FE exam</p></div>';
    if(!installSeen()) h+='<div style="background:#1a1600;border:1px solid #3a3000;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">📲</span><div style="flex:1;"><p style="font-size:12px;font-weight:600;color:#f5c518;">Add to Home Screen</p><p style="font-size:11px;color:#888;">Safari Share → "Add to Home Screen"</p></div><button onclick="lss(\'inst\',\'1\');render()" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer;line-height:1;">×</button></div>';
    h+='<div class="tabs"><button class="'+(S.tab==='quiz'?'on':'')+'" onclick="S.tab=\'quiz\';render()">Quiz</button><button class="'+(S.tab==='offline'?'on':'')+'" onclick="S.tab=\'offline\';render()">Offline</button><button class="'+(S.tab==='formulas'?'on':'')+'" onclick="S.tab=\'formulas\';render()">Formulas</button><button class="'+(S.tab==='stats'?'on':'')+'" onclick="S.tab=\'stats\';render()">Stats</button></div>';

    if(S.tab==='quiz'){
      if(S.err) h+='<div style="background:#2b0d0d;border:1px solid #7f1d1d;border-radius:10px;padding:11px 13px;margin-bottom:12px;color:#fca5a5;font-size:13px;">'+S.err+'</div>';
      h+='<div class="seg"><button class="'+(S.mode==='c'?'on':'')+'" onclick="S.mode=\'c\';render()">Conceptual <span style="font-size:10px;padding:1px 5px;border-radius:99px;background:'+(S.mode==='c'?'rgba(0,0,0,.15)':'#2a2a2a')+';margin-left:4px;">No math</span></button><button class="'+(S.mode==='n'?'on':'')+'" onclick="S.mode=\'n\';render()">Computational <span style="font-size:10px;padding:1px 5px;border-radius:99px;background:'+(S.mode==='n'?'rgba(0,0,0,.15)':'#2a2a2a')+';margin-left:4px;">Calc</span></button></div>';
      h+='<div class="card"><span class="lbl">Topic</span><div style="position:relative"><select onchange="S.cat=this.value;render()">'+CATS.map(function(c){return '<option'+(c===S.cat?' selected':'')+'>'+c+'</option>';}).join('')+'</select><span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;font-size:10px;">▼</span></div></div>';
      h+='<div class="card"><span class="lbl">Difficulty</span><div class="g4">'+DIFFS.map(function(d){return '<button class="sb'+(S.diff===d?' on':'')+'" onclick="S.diff=\''+d+'\';render()">'+d+'</button>';}).join('')+'</div></div>';
      h+='<div class="card"><span class="lbl">Questions</span><div class="g4">'+COUNTS.map(function(n){return '<button class="sb'+(S.count===n?' on':'')+'" onclick="S.count='+n+';render()">'+n+'</button>';}).join('')+'</div></div>';
      h+='<div class="card"><span class="lbl">Timer per question</span><div class="g4">'+TIMERS.map(function(t){return '<button class="sb'+(S.timer===t.v?' on':'')+'" onclick="S.timer='+t.v+';render()">'+t.l+'</button>';}).join('')+'</div></div>';
      h+='<p style="font-size:12px;color:#555;text-align:center;margin-bottom:10px;">📦 '+QB.length+' offline questions ready</p>';
      h+='<button class="btn" onclick="startQuiz()">Start Quiz →</button>';
    }

    if(S.tab==='offline'){
      h+='<div class="card"><p style="font-size:14px;font-weight:600;margin-bottom:6px;">Built-in Question Bank</p><p style="font-size:13px;color:#888;line-height:1.6;margin-bottom:12px;">Your app has <strong style="color:#f5c518;">'+QB.length+' questions</strong> built in — no internet needed.</p><div class="hr"></div>';
      CATS.filter(function(c){return c!=='All';}).forEach(function(c){
        var n=QB.filter(function(q){return q[1]===c;}).length;
        h+='<div class="wr"><span style="font-size:13px;">'+c+'</span><span style="font-size:12px;color:#f5c518;font-weight:600;">'+n+'q</span></div>';
      });
      h+='</div><div class="card"><p style="font-size:14px;font-weight:600;margin-bottom:8px;">📲 Add to iPhone</p><p style="font-size:13px;color:#888;line-height:1.7;">1. Open in <strong>Safari</strong><br>2. Tap <strong style="color:#f5c518;">Share ↑</strong><br>3. Tap <strong style="color:#f5c518;">"Add to Home Screen"</strong><br>4. Tap <strong style="color:#f5c518;">Add</strong></p></div>';
    }

    if(S.tab==='formulas'){
      h+='<h2 style="font-size:16px;font-weight:600;margin-bottom:4px;">Formula Reference</h2><p style="font-size:13px;color:#888;margin-bottom:14px;">Key FE equations — works offline</p>';
      var fc=[]; FORMULAS.forEach(function(f){if(fc.indexOf(f.cat)<0)fc.push(f.cat);});
      fc.forEach(function(cat){
        h+='<p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;">'+cat+'</p>';
        FORMULAS.filter(function(f){return f.cat===cat;}).forEach(function(f){
          h+='<div class="fcard"><p style="font-family:monospace;font-size:14px;color:#f5c518;margin-bottom:3px;">'+f.f+'</p><p style="font-size:12px;color:#888;">'+f.n+'</p></div>';
        });
      });
    }

    if(S.tab==='stats'){
      var st=getStats(), sess=getSessions();
      h+='<h2 style="font-size:16px;font-weight:600;margin-bottom:4px;">My Stats</h2><p style="font-size:13px;color:#888;margin-bottom:14px;">Cumulative performance</p>';
      var kk=Object.keys(st);
      if(!kk.length){ h+='<div class="card"><p style="font-size:13px;color:#888;text-align:center;">No data yet. Complete a quiz first.</p></div>'; }
      else {
        var tc=0,tt=0; kk.forEach(function(k){tc+=st[k].c;tt+=st[k].t;});
        h+='<div class="card" style="text-align:center;margin-bottom:12px;"><div class="big">'+tc+'<span style="font-size:22px;color:#555;">/'+tt+'</span></div><p style="color:#888;font-size:14px;margin-top:4px;">'+Math.round(tc/tt*100)+'% overall</p></div>';
        h+='<p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">By category</p>';
        kk.sort(function(a,b){return(st[a].c/st[a].t)-(st[b].c/st[b].t);}).forEach(function(k){
          var p=Math.round(st[k].c/st[k].t*100),col=p>=70?'#22c55e':p>=50?'#f5c518':'#ef4444';
          h+='<div class="wr"><span style="font-size:13px;flex:1;">'+k+'</span><div class="wbar"><div style="height:4px;width:'+p+'%;background:'+col+';border-radius:99px;"></div></div><span style="font-size:12px;color:'+col+';font-weight:600;margin-left:8px;min-width:30px;">'+p+'%</span></div>';
        });
        if(sess.length){
          h+='<p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;">Recent Sessions</p>';
          sess.slice(0,5).forEach(function(s){
            var p=Math.round(s.sc/s.tot*100),col=p>=70?'#22c55e':p>=50?'#f5c518':'#ef4444';
            h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;"><span style="font-size:13px;">'+s.cat+'</span><span style="font-size:12px;color:#555;">'+s.d+'</span><span style="font-size:13px;color:'+col+';font-weight:600;">'+s.sc+'/'+s.tot+'</span></div>';
          });
        }
      }
    }
  }

  else if(S.screen==='loading'){
    h='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;"><div class="spin"></div><p style="color:#666;font-size:14px;">Generating questions…</p></div>';
  }

  else if(S.screen==='quiz'){
    var q=S.qs[S.cur];
    if(!q){S.screen='home';render();return;}
    var opts=q[5].split('|');
    var timedOut=S.sel==='__to__';
    var notes=getNotes(), hasNote=!!notes[q[0]];
    var prog=S.cur/S.qs.length*100;
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    h+='<div style="display:flex;gap:5px;align-items:center;"><span style="display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;background:#1a1600;color:#f5c518;border:1px solid #3a3000;">'+(S.mode==='c'?'Concept':'Calc')+'</span>'+(S.flagged.indexOf(S.cur)>=0?'<span style="font-size:11px;color:#ef4444;">🚩</span>':'')+(hasNote?'<span style="font-size:11px;color:#f5c518;">📝</span>':'')+'</div>';
    h+='<div style="display:flex;gap:8px;align-items:center;">'+(S.streak>=2?'<span class="streak">🔥'+S.streak+'</span>':'')+(S.timer>0&&S.sel===null?'<span class="tmr'+(S.tLeft<=10?' red':'')+'" id="tmr">'+S.tLeft+'s</span>':'')+'<span style="font-size:13px;color:#888;font-weight:500;">'+(S.cur+1)+'/'+S.qs.length+'</span></div></div>';
    h+='<div class="bar"><div class="barfill" style="width:'+prog+'%;"></div></div>';
    if(q[8]) h+='<div class="fbox"><span style="font-size:9px;color:#555;font-family:sans-serif;text-transform:uppercase;letter-spacing:.08em;">Formula</span><br>'+q[8]+'</div>';
    h+='<div class="card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;gap:8px;"><p style="font-size:15px;font-weight:500;line-height:1.65;flex:1;">'+q[4]+'</p><div style="display:flex;flex-direction:column;gap:6px;"><button onclick="toggleFlag()" style="background:none;border:none;cursor:pointer;font-size:15px;opacity:.5;">🚩</button><button onclick="S.modal=\'note\';render()" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;">📝</button></div></div></div>';
    if(timedOut) h+='<div style="background:#2b0d0d;border:1px solid #7f1d1d;border-radius:10px;padding:11px;margin-bottom:10px;color:#fca5a5;font-size:13px;">⏱ Time\'s up! Correct: '+q[6]+'</div>';
    opts.forEach(function(opt){
      var letter=opt.charAt(0),cls='opt';
      if(S.sel!==null&&!timedOut){if(letter===q[6])cls+=' ok';else if(opt===S.sel)cls+=' ng';}
      else if(opt===S.sel)cls+=' sel';
      h+='<button class="'+cls+'" '+(S.sel!==null?'disabled':'')+' onclick="pick(\''+esc(opt)+'\')">'+opt+'</button>';
    });
    if(S.sel&&!timedOut) h+='<div class="explain">💡 '+q[7]+'</div>';
    if(S.sel!==null&&!S.conf[S.cur]){
      h+='<p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:8px;">Confident? <span style="font-weight:400;opacity:.6;">(optional)</span></p>';
      h+='<div class="conf"><button style="border-color:#22c55e55;color:#22c55e;" onclick="conf(\'Got it\')">Got it</button><button style="border-color:#f5c51855;color:#f5c518;" onclick="conf(\'Shaky\')">Shaky</button><button style="border-color:#ef444455;color:#ef4444;" onclick="conf(\'Missed\')">Missed</button></div>';
    }
    if(S.sel!==null) h+='<button class="btn" onclick="next()">'+(S.cur+1<S.qs.length?'Next →':'See Results →')+'</button>';
    h+='<button style="width:100%;padding:10px;border-radius:12px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:13px;cursor:pointer;margin-top:0;" onclick="S.modal=\'exit\';render()">← Home</button>';
  }

  else if(S.screen==='results'){
    var tot=S.ans.length, ok=S.ans.filter(function(a){return a.ok;}).length;
    var pct=Math.round(ok/tot*100);
    h+='<div style="text-align:center;margin-bottom:22px;"><div style="font-size:28px;margin-bottom:10px;">'+(pct>=70?'🎉':pct>=50?'📚':'💪')+'</div><div class="big">'+ok+'<span style="font-size:22px;color:#555;">/'+tot+'</span></div><p style="color:#888;font-size:14px;margin:6px 0 10px;">'+pct+'%</p><span style="display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;'+(pct>=70?'background:#0d2b1d;color:#86efac;':'background:#2b0d0d;color:#fca5a5;')+'">'+(pct>=70?'Pass ✓':'Keep Studying')+'</span>'+(S.best>=3?'<p style="font-size:12px;color:#f5c518;margin-top:8px;">🔥 Best streak: '+S.best+'</p>':'')+'</div>';
    h+='<div class="card" style="margin-bottom:12px;"><p style="font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">By category</p>';
    var sk=Object.keys(S.stats);
    sk.sort(function(a,b){return(S.stats[a].c/S.stats[a].t)-(S.stats[b].c/S.stats[b].t);}).forEach(function(cat){
      var v=S.stats[cat],p=Math.round(v.c/v.t*100),col=p>=70?'#22c55e':p>=50?'#f5c518':'#ef4444';
      h+='<div class="wr"><span style="font-size:13px;flex:1;">'+cat+'</span><div class="wbar"><div style="height:4px;width:'+p+'%;background:'+col+';border-radius:99px;"></div></div><span style="font-size:12px;color:'+col+';font-weight:600;margin-left:8px;">'+p+'%</span></div>';
    });
    h+='</div>';
    h+='<details style="margin-bottom:14px;"><summary style="font-size:13px;font-weight:600;cursor:pointer;padding:10px 0;list-style:none;color:#e5e5e5;">▶ Review all ('+tot+')</summary><div style="margin-top:10px;">';
    S.ans.forEach(function(a,i){
      var cr=S.conf[i]||'', col=cr==='Got it'?'#22c55e':cr==='Shaky'?'#f5c518':'#ef4444';
      h+='<div class="'+(a.ok?'rok':'rng')+'"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:11px;color:#555;">Q'+(i+1)+' · '+a.cat+(S.flagged.indexOf(i)>=0?' 🚩':'')+'</span><div style="display:flex;gap:5px;">'+(cr?'<span style="font-size:10px;color:'+col+';">'+cr+'</span>':'')+'<span style="font-size:11px;font-weight:600;color:'+(a.to?'#f5c518':a.ok?'#22c55e':'#ef4444')+';">'+(a.to?'⏱':a.ok?'✓':'✗')+'</span></div></div>'+(a.f?'<p style="font-family:monospace;font-size:12px;color:#f5c518;margin-bottom:4px;">'+a.f+'</p>':'')+'<p style="font-size:13px;margin-bottom:4px;line-height:1.5;">'+a.q+'</p>'+((!a.ok&&a.sel)?'<p style="font-size:12px;color:#ef4444;margin-bottom:3px;">Your: '+a.sel+'</p>':'')+'<p style="font-size:12px;color:#22c55e;">✓ '+a.ans+' — '+a.exp+'</p></div>';
    });
    h+='</div></details>';
    h+='<div style="display:flex;gap:8px;"><button class="btn2" onclick="S.tab=\'stats\';S.screen=\'home\';render()">Stats</button><button class="btn2" onclick="S.screen=\'home\';S.tab=\'quiz\';render()">← Home</button><button class="btn" style="flex:1;margin-bottom:0;" onclick="startQuiz()">Retake ↺</button></div>';
  }

  a.innerHTML=h;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function startQuiz(){
  S.err='';S.ans=[];S.cur=0;S.sel=null;S.streak=0;S.best=0;S.flagged=[];S.conf={};S.stats={};
  S.qs=pool();
  if(!S.qs.length){S.err='No questions match. Try different settings.';render();return;}
  S.screen='quiz'; render(); startTimer();
}

function startTimer(){
  clearInterval(S.tId);
  if(!S.timer) return;
  S.tLeft=S.timer;
  S.tId=setInterval(function(){
    S.tLeft--;
    var el=document.getElementById('tmr');
    if(el){el.textContent=S.tLeft+'s';if(S.tLeft<=10)el.className='tmr red';}
    if(S.tLeft<=0){clearInterval(S.tId);S.sel='__to__';render();}
  },1000);
}

function pick(opt){
  if(S.sel!==null) return;
  clearInterval(S.tId);
  S.sel=opt; render();
}

function conf(c){ S.conf[S.cur]=c; render(); }

function toggleFlag(){
  var i=S.flagged.indexOf(S.cur);
  if(i>=0)S.flagged.splice(i,1);else S.flagged.push(S.cur);
  render();
}

function next(){
  var q=S.qs[S.cur];
  var sel=S.sel==='__to__'?null:S.sel;
  var ok=sel?sel.charAt(0)===q[6]:false;
  var ns=ok?S.streak+1:0; S.streak=ns; if(ns>S.best)S.best=ns;
  var cat=q[1]; var pv=S.stats[cat]||{c:0,t:0}; S.stats[cat]={c:pv.c+(ok?1:0),t:pv.t+1};
  addStat(cat,ok);
  S.ans.push({q:q[4],ans:q[6],exp:q[7],f:q[8],cat:cat,sel:sel,ok:ok,to:S.sel==='__to__'});
  if(S.cur+1<S.qs.length){S.cur++;S.sel=null;render();startTimer();}
  else{addSession(S.ans.filter(function(a){return a.ok;}).length,S.ans.length,S.mode,S.cat);S.screen='results';render();}
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.onerror=function(msg){
  var a=document.getElementById('app');
  if(a)a.innerHTML='<div style="padding:40px 20px;text-align:center;"><p style="color:#f5c518;font-size:16px;margin-bottom:8px;">⚠️ Error</p><p style="color:#888;font-size:13px;margin-bottom:20px;">'+msg+'</p><button onclick="location.reload()" style="padding:12px 24px;background:#f5c518;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">Reload</button></div>';
  return true;
};
render();
</script>
