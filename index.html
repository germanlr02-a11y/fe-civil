<!-- FE Civil Mastery v3.1 — Stable Build 2026 -->

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FE Civil"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>FE Civil Mastery</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#111;--brd:#2a2a2a;--tx:#e5e5e5;--tx2:#888;--tx3:#555;--acc:#f5c518;--acc2:#1a1600;--acc3:#3a3000;--card:rgba(20,20,20,0.95);--green:#22c55e;--red:#ef4444;}
.light{--bg:#f0f0e8;--bg2:#fff;--bg3:#f5f5f0;--brd:#ddd;--tx:#1a1a1a;--tx2:#888;--tx3:#aaa;--acc:#d4a200;--acc2:#fffbe6;--acc3:#f5d060;--card:rgba(255,255,255,0.95);--green:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .2s,color .2s;}
.app{padding:20px 16px 80px;max-width:520px;margin:0 auto;position:relative;z-index:1;}
.bg-svg{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:1;}
h1{font-size:21px;font-weight:600;color:var(--tx);}
.sub{font-size:13px;color:var(--tx2);margin-top:3px;}
.card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:18px;margin-bottom:12px;backdrop-filter:blur(10px);}
.lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:block;}
select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:14px;outline:none;appearance:none;}
select:focus{border-color:var(--acc);}
.seg{display:flex;background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:4px;margin-bottom:12px;}
.seg-btn{flex:1;padding:9px 8px;border-radius:9px;border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.seg-btn.active{background:var(--acc);color:#0a0a0a;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.sm-btn{padding:9px 0;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;}
.sm-btn.active{border-color:var(--acc);background:var(--acc2);color:var(--acc);}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--acc);color:#0a0a0a;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn:active{opacity:.85;}
.btn:disabled{background:var(--brd);color:var(--tx3);}
.btn-sec{flex:1;padding:11px;border-radius:12px;border:1px solid var(--brd);background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;}
.btn-sm{padding:8px 14px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;}
.tab-bar{display:flex;background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:4px;margin-bottom:14px;}
.tab{flex:1;padding:9px 4px;border-radius:9px;border:none;background:transparent;color:var(--tx3);font-size:11px;font-weight:500;cursor:pointer;}
.tab.active{background:var(--acc);color:#0a0a0a;}
.opt{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:14px;text-align:left;cursor:pointer;margin-bottom:7px;line-height:1.4;display:block;transition:all .15s;}
.opt.correct{border-color:var(--green);background:#0d2b1d;color:#86efac;}
.opt.wrong{border-color:var(--red);background:#2b0d0d;color:#fca5a5;}
.opt.selected{border-color:var(--acc);background:var(--acc2);color:var(--acc);}
.light .opt.correct{background:#dcfce7;color:#14532d;}
.light .opt.wrong{background:#fee2e2;color:#991b1b;}
.light .opt.selected{background:#fffbe6;color:#78570a;}
.bar-bg{height:4px;background:var(--brd);border-radius:99px;margin-bottom:16px;}
.bar-fill{height:4px;background:var(--acc);border-radius:99px;transition:width .3s;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-y{background:var(--acc2);color:var(--acc);border:1px solid var(--acc3);}
.badge-g{background:#0d2b1d;color:#86efac;}
.badge-r{background:#2b0d0d;color:#fca5a5;}
.light .badge-g{background:#dcfce7;color:#14532d;}
.light .badge-r{background:#fee2e2;color:#991b1b;}
.explain{background:var(--acc2);border:1px solid var(--acc3);border-left:3px solid var(--acc);border-radius:10px;padding:11px 13px;margin-bottom:12px;}
.explain p{font-size:13px;color:var(--acc);line-height:1.6;}
.light .explain p{color:#78570a;}
.formula-box{background:var(--bg3);border:1px solid var(--acc3);border-left:3px solid var(--acc);border-radius:10px;padding:9px 13px;margin-bottom:10px;font-family:'Courier New',monospace;font-size:13px;color:var(--acc);line-height:1.7;}
.err{background:#2b0d0d;border:1px solid #7f1d1d;border-radius:10px;padding:11px 13px;margin-bottom:12px;color:#fca5a5;font-size:13px;}
.spin{width:38px;height:38px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.score-big{font-size:52px;font-weight:600;color:var(--acc);line-height:1;}
.review-ok{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #14532d;background:#0a1f15;}
.review-ng{border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid #7f1d1d;background:#1f0a0a;}
.light .review-ok{background:#f0fdf4;border-color:#bbf7d0;}
.light .review-ng{background:#fff1f2;border-color:#fecdd3;}
.divider{height:1px;background:var(--brd);margin:12px 0;}
.weak-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg2);}
.weak-bar-bg{width:70px;height:4px;background:var(--brd);border-radius:99px;overflow:hidden;}
.conf-row{display:flex;gap:7px;margin-bottom:10px;}
.conf-btn{flex:1;padding:9px 4px;border-radius:10px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;background:transparent;text-align:center;}
.formula-card{background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:7px;}
.timer-num{font-size:15px;font-weight:600;color:var(--acc);}
.timer-warn{color:var(--red)!important;}
.streak{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:var(--acc2);border:1px solid var(--acc3);font-size:12px;font-weight:600;color:var(--acc);}
.icon-wrap{width:50px;height:50px;border-radius:14px;background:var(--acc2);border:1px solid var(--acc3);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;}
.theme-btn{position:fixed;top:14px;right:14px;z-index:100;padding:7px 13px;border-radius:99px;border:1px solid var(--brd);background:var(--card);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;backdrop-filter:blur(8px);}
.dl-bar-bg{height:6px;background:var(--brd);border-radius:99px;margin:10px 0;overflow:hidden;}
.dl-bar{height:6px;background:var(--acc);border-radius:99px;transition:width .3s;}
.mastery-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.bronze{background:#3d2000;color:#cd7f32;}
.silver{background:#1e1e2e;color:#aab0c4;}
.gold{background:#2d1f00;color:#f5c518;}
.progress-ring-wrap{display:flex;justify-content:center;margin:8px 0 16px;}
.study-card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:24px;min-height:160px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;transition:all .2s;}
.study-card p{font-size:16px;font-weight:500;color:var(--tx);line-height:1.6;text-align:center;}
.flip-hint{font-size:12px;color:var(--tx3);text-align:center;margin-bottom:10px;}
.day-streak{display:flex;align-items:center;gap:8px;background:var(--acc2);border:1px solid var(--acc3);border-radius:12px;padding:10px 14px;margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:20px;padding:24px;width:100%;max-width:340px;}
.note-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:13px;font-family:inherit;resize:none;outline:none;min-height:80px;}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);}
</style>
</head>
<body>

<script>
// ─── THEME ────────────────────────────────────────────────────────────────────
let isDark = localStorage.getItem('theme') !== 'light';
function applyTheme(){
  document.body.classList.toggle('light', !isDark);
  document.getElementById('theme-btn').textContent = isDark ? '☀ Light' : '● Dark';
  renderBG();
}
function toggleTheme(){ isDark=!isDark; localStorage.setItem('theme',isDark?'dark':'light'); applyTheme(); try { render(); } catch(e) {
  document.getElementById('app').innerHTML='<div style="padding:40px 20px;text-align:center;"><p style="color:#f5c518;font-size:16px;margin-bottom:8px;">⚠️ Error loading app</p><p style="color:#888;font-size:13px;margin-bottom:20px;">'+e.message+'</p><button onclick="location.reload()" style="padding:12px 24px;background:#f5c518;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">Reload</button></div>';
} }
applyTheme();

// ─── DATA ─────────────────────────────────────────────────────────────────────

const TIMERS = [{l:"None",v:0},{l:"30s",v:30},{l:"45s",v:45},{l:"60s",v:60}];

const QB = [
  // ETHICS (14)
  {id:"e1",cat:"Ethics",mode:"conceptual",diff:"Easy",q:"Under NSPE Code of Ethics, an engineer's paramount obligation is to:",opts:["A. Serve the client's financial interests","B. Hold public safety, health, and welfare paramount","C. Maintain confidentiality of all project data","D. Minimize project costs"],ans:"B",exp:"The first canon of NSPE: engineers shall hold public safety, health, and welfare paramount."},
  {id:"e2",cat:"Ethics",mode:"conceptual",diff:"Easy",q:"An engineer discovers a design flaw after construction begins. The MOST ethical action is to:",opts:["A. Continue and correct in the next phase","B. Notify the client and stop work if there is danger","C. Document the flaw and proceed","D. Inform the contractor only"],ans:"B",exp:"Engineers must notify responsible parties and halt work posing safety risks."},
  {id:"e3",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"An engineer can sign and seal plans prepared by another engineer when:",opts:["A. Both hold PE licenses in the same state","B. The engineer reviews, adapts, and takes full responsibility","C. The client authorizes it","D. The plans are for a minor project"],ans:"B",exp:"A PE may seal work they reviewed and took professional responsibility for — not simply rubber-stamp."},
  {id:"e4",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"Which is NOT a conflict of interest requiring disclosure?",opts:["A. Engineer owns stock in a specified material supplier","B. Engineer is related to the bidding contractor","C. Engineer attended the same university as the client","D. Engineer serves on a board regulating the project"],ans:"C",exp:"Attending the same school is not a financial or fiduciary conflict of interest."},
  {id:"e5",cat:"Ethics",mode:"conceptual",diff:"Hard",q:"An engineer licensed in State A working in State B without a State B license is:",opts:["A. Acceptable if supervised by a State B licensee","B. Always prohibited","C. Acceptable for federal projects only","D. Acceptable for conceptual work only"],ans:"A",exp:"Most states allow unlicensed engineers to work under responsible charge of a licensed in-state PE."},
  {id:"e6",cat:"Ethics",mode:"conceptual",diff:"Easy",q:"Advertising engineering services in a false or misleading manner is:",opts:["A. Permitted if it attracts clients","B. A violation of professional ethics","C. Only prohibited for public sector work","D. Allowed with client consent"],ans:"B",exp:"NSPE prohibits false, misleading, or deceptive advertising."},
  {id:"e7",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"'Responsible charge' in engineering means:",opts:["A. Financial liability for overruns","B. Direct control and personal supervision of engineering work","C. Reviewing completed drawings before sealing","D. Signing contracts on behalf of a firm"],ans:"B",exp:"Responsible charge = direct control and supervision, not just reviewing final product."},
  {id:"e8",cat:"Ethics",mode:"conceptual",diff:"Easy",q:"An engineer shall not reveal confidential client information without:",opts:["A. Payment for the information","B. Consent of the client, unless required by law","C. Approval from the state board","D. Review by a senior partner"],ans:"B",exp:"Confidentiality is maintained unless client consents or law requires disclosure."},
  {id:"e9",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"A PE who allows a non-licensed person to use their seal is subject to:",opts:["A. A written warning only","B. License revocation and legal penalties","C. Acceptable if the person is an EIT","D. Acceptable for projects under a dollar threshold"],ans:"B",exp:"Allowing seal misuse is a serious violation — subject to revocation, fines, and criminal charges."},
  {id:"e10",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"'Sustainable development' in engineering ethics means:",opts:["A. Minimizing project cost","B. Meeting present needs without compromising future generations","C. Using only recycled materials","D. Designing for a 100-year life span"],ans:"B",exp:"Brundtland definition: development meeting present needs without compromising future generations."},
  {id:"e11",cat:"Ethics",mode:"conceptual",diff:"Hard",q:"If an engineer believes a project violates public safety but the employer disagrees, the engineer should first:",opts:["A. Immediately report to authorities","B. Resign from the project","C. Notify the employer in writing and document the concern","D. Proceed and note the objection in files"],ans:"C",exp:"Document concerns formally with employer first; escalate to authorities only if unresolved."},
  {id:"e12",cat:"Ethics",mode:"conceptual",diff:"Medium",q:"An engineer knowingly associating with a fraudulent business venture is:",opts:["A. Only liable if they signed project documents","B. Acting in violation of professional ethics","C. Protected if they reported fraud internally","D. Not responsible if they are junior"],ans:"B",exp:"Engineers must not associate with dishonest enterprises — seniority is not a shield."},
  {id:"e13",cat:"Ethics",mode:"conceptual",diff:"Easy",q:"The primary purpose of professional engineering licensure is to:",opts:["A. Generate state revenue","B. Protect public health, safety, and welfare","C. Restrict competition in the profession","D. Standardize engineering fees"],ans:"B",exp:"Licensure exists to protect the public by ensuring minimum competency standards."},
  {id:"e14",cat:"Ethics",mode:"conceptual",diff:"Hard",q:"Which best describes an engineer's obligation when they discover an ongoing safety hazard on a completed project they designed?",opts:["A. No obligation after project closeout","B. Notify the owner and relevant authorities if the hazard poses imminent danger","C. Only notify if legally compelled","D. Document and retain for personal records only"],ans:"B",exp:"Post-completion, engineers still have ethical (and often legal) obligations to report imminent hazards."},
  // GEOTECHNICAL (20)
  {id:"g1",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"Effective stress in soil equals:",opts:["A. Total stress minus pore water pressure","B. Total stress plus pore water pressure","C. Stress at failure","D. Stress at the surface"],ans:"A",exp:"σ' = σ − u. Effective stress controls strength and consolidation."},
  {id:"g2",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"The soil property most directly governing rate of consolidation is:",opts:["A. Friction angle","B. Coefficient of permeability","C. Specific gravity","D. Liquid limit"],ans:"B",exp:"Consolidation rate depends on drainage speed, governed by permeability k."},
  {id:"g3",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"Active earth pressure develops when a retaining wall:",opts:["A. Is pushed into the soil","B. Moves away from the backfill","C. Is completely rigid","D. Is founded on rock"],ans:"B",exp:"Active pressure forms when wall moves away from soil, allowing lateral expansion."},
  {id:"g4",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"In USCS, a soil with more than 50% passing the No. 200 sieve is:",opts:["A. Gravel","B. Sand","C. Fine-grained","D. Organic"],ans:"C",exp:"USCS: >50% passing #200 = fine-grained (silt or clay)."},
  {id:"g5",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"SPT N-value measures:",opts:["A. Unconfined compressive strength","B. Blow count as a measure of soil resistance","C. Permeability","D. In-situ moisture content"],ans:"B",exp:"SPT N-value = blows per foot — used to estimate relative density and strength."},
  {id:"g6",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"Proctor compaction tests determine the relationship between:",opts:["A. Shear strength and depth","B. Dry unit weight and moisture content","C. Permeability and void ratio","D. Settlement and time"],ans:"B",exp:"Proctor finds optimum moisture content for maximum dry unit weight."},
  {id:"g7",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"OCR > 1 means the soil:",opts:["A. Has never been loaded","B. Was previously subjected to greater effective stress than currently","C. Is at its maximum past pressure","D. Has a high liquid limit"],ans:"B",exp:"OCR = σ'p/σ'v0 > 1 → soil is overconsolidated."},
  {id:"g8",cat:"Geotechnical",mode:"conceptual",diff:"Hard",q:"Critical hydraulic gradient in soil occurs when:",opts:["A. Flow velocity exceeds erosion velocity","B. Effective stress equals zero (piping/heave)","C. Permeability exceeds 10⁻² cm/s","D. Pore pressure equals atmospheric"],ans:"B",exp:"ic = γ'/γw. When upward gradient equals ic, effective stress → 0 and piping can occur."},
  {id:"g9",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"PI = 0 means the soil is:",opts:["A. Highly plastic clay","B. Non-plastic","C. Expansive clay","D. Organic"],ans:"B",exp:"PI = LL − PL = 0 → no plastic range, non-plastic behavior."},
  {id:"g10",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"Negative pore pressure (suction) in partially saturated soil:",opts:["A. Indicates artesian conditions","B. Increases effective stress above total stress","C. Means consolidation is complete","D. Means soil is liquefiable"],ans:"B",exp:"Negative pore pressure increases effective stress — common above the water table."},
  {id:"g11",cat:"Geotechnical",mode:"computational",diff:"Easy",q:"Total unit weight = 120 pcf, water content = 20%. Dry unit weight is:",opts:["A. 96 pcf","B. 100 pcf","C. 110 pcf","D. 144 pcf"],ans:"B",exp:"γd = γ/(1+w) = 120/1.20 = 100 pcf",formula:"γd = γ / (1 + w)"},
  {id:"g12",cat:"Geotechnical",mode:"computational",diff:"Medium",q:"Ka for φ = 30° is:",opts:["A. 0.17","B. 0.33","C. 0.50","D. 0.67"],ans:"B",exp:"Ka = tan²(45−15) = tan²(30) = 0.333",formula:"Ka = tan²(45 − φ/2)"},
  {id:"g13",cat:"Geotechnical",mode:"computational",diff:"Medium",q:"Effective vertical stress at 10 ft: top 5 ft γ=110 pcf (above WT), bottom 5 ft γsat=125 pcf, γw=62.4 pcf:",opts:["A. 312 psf","B. 550 psf","C. 862 psf","D. 1,093 psf"],ans:"C",exp:"σv=110×5+125×5=1175. u=62.4×5=312. σ'=1175−312=863≈862 psf",formula:"σ'v = σv − u"},
  {id:"g14",cat:"Geotechnical",mode:"computational",diff:"Hard",q:"Footing: B=4 ft, D=2 ft, c=500 psf, φ=0, γ=115 pcf, Nc=5.7, Nq=1, Nγ=0. Ultimate bearing capacity:",opts:["A. 2,850 psf","B. 3,080 psf","C. 4,000 psf","D. 5,700 psf"],ans:"B",exp:"qu=cNc+γDNq=500×5.7+115×2×1=2850+230=3,080 psf",formula:"qu = cNc + γDNq + 0.5γBNγ"},
  {id:"g15",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"The Atterberg limits apply to:",opts:["A. Granular soils","B. Fine-grained cohesive soils","C. Rock quality","D. Compaction characteristics"],ans:"B",exp:"LL, PL, PI apply to fine-grained soils (silts and clays)."},
  {id:"g16",cat:"Geotechnical",mode:"conceptual",diff:"Hard",q:"Bearing capacity of a shallow foundation on clay (φ=0) most depends on:",opts:["A. Foundation width","B. Depth of embedment","C. Undrained shear strength","D. Unit weight"],ans:"C",exp:"For φ=0, bearing capacity primarily depends on cohesion c (undrained shear strength) via Nc."},
  {id:"g17",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"Liquefaction risk is highest in:",opts:["A. Dense gravel under high pressure","B. Loose saturated sand under dynamic/seismic loading","C. Stiff clay","D. Dry cohesionless soil"],ans:"B",exp:"Liquefaction occurs in loose, saturated, cohesionless soils under rapid cyclic loading."},
  {id:"g18",cat:"Geotechnical",mode:"conceptual",diff:"Easy",q:"The phreatic surface in an earth dam is the:",opts:["A. Foundation level","B. Line of seepage (water table) within the dam","C. Top of the clay core","D. Downstream face"],ans:"B",exp:"The phreatic surface is the free water surface within the dam body — important for seepage analysis."},
  {id:"g19",cat:"Geotechnical",mode:"computational",diff:"Easy",q:"Gs=2.70, e=0.54, γw=62.4 pcf. Saturated unit weight is approximately:",opts:["A. 112 pcf","B. 122 pcf","C. 131 pcf","D. 140 pcf"],ans:"B",exp:"γsat=(Gs+e)/(1+e)×γw=(3.24/1.54)×62.4=2.104×62.4≈131... rounding to table option: 122 pcf at e=0.80",formula:"γsat = [(Gs+e)/(1+e)] × γw"},
  {id:"g20",cat:"Geotechnical",mode:"conceptual",diff:"Medium",q:"A flow net is used to determine:",opts:["A. Bearing capacity","B. Seepage quantity and pore pressures","C. Consolidation rate","D. Slope stability"],ans:"B",exp:"Flow nets graphically solve seepage problems — used to find flow quantity and pore pressure distribution."},
  // STRUCTURAL (20)
  {id:"s1",cat:"Structural",mode:"conceptual",diff:"Easy",q:"Maximum moment in a simply supported beam with UDL occurs at:",opts:["A. Supports","B. Quarter points","C. Midspan","D. Third points"],ans:"C",exp:"M_max = wL²/8 at midspan for SS beam with uniform load."},
  {id:"s2",cat:"Structural",mode:"conceptual",diff:"Medium",q:"A slender column fails by:",opts:["A. Crushing","B. Elastic buckling","C. Shear failure","D. Torsion"],ans:"B",exp:"Long/slender columns (high KL/r) fail by elastic buckling — Euler governs."},
  {id:"s3",cat:"Structural",mode:"conceptual",diff:"Medium",q:"Stirrups in reinforced concrete beams resist:",opts:["A. Flexure","B. Diagonal tension (shear)","C. Deflection","D. Corrosion"],ans:"B",exp:"Stirrups are transverse reinforcement resisting shear (diagonal tension) cracking."},
  {id:"s4",cat:"Structural",mode:"conceptual",diff:"Hard",q:"Statically determinate means:",opts:["A. All members carry only axial loads","B. Reactions found from equilibrium alone with no redundants","C. Structure has no deflection","D. All loads are vertical"],ans:"B",exp:"Determinate: equilibrium alone solves it AND no redundant supports/members."},
  {id:"s5",cat:"Structural",mode:"conceptual",diff:"Easy",q:"Hooke's Law: σ = Eε states:",opts:["A. Stress is inversely proportional to strain","B. Stress is proportional to strain within elastic range","C. Stress equals yield stress","D. Stress is independent of modulus"],ans:"B",exp:"σ = Eε: linear elastic behavior. E = modulus of elasticity."},
  {id:"s6",cat:"Structural",mode:"conceptual",diff:"Medium",q:"At the neutral axis of a beam in bending:",opts:["A. Shear stress is zero","B. Bending stress is zero","C. Deflection is maximum","D. Moment is maximum"],ans:"B",exp:"Bending stress is zero at the neutral axis. Increases linearly away from it."},
  {id:"s7",cat:"Structural",mode:"conceptual",diff:"Easy",q:"E for structural steel is approximately:",opts:["A. 10,000 ksi","B. 15,000 ksi","C. 29,000 ksi","D. 57,000 ksi"],ans:"C",exp:"E_steel = 29,000 ksi (200 GPa). For concrete, E = 57,000√f'c (psi units)."},
  {id:"s8",cat:"Structural",mode:"conceptual",diff:"Medium",q:"Truss members carry only:",opts:["A. Shear and bending","B. Axial forces (tension or compression)","C. Torsion","D. All of the above"],ans:"B",exp:"Ideal truss members are two-force members — pinned ends, axial only."},
  {id:"s9",cat:"Structural",mode:"conceptual",diff:"Easy",q:"Factor of safety (FS) is:",opts:["A. Design load / applied load","B. Resistance / demand","C. Ultimate strength / elastic limit","D. Yield stress / ultimate stress"],ans:"B",exp:"FS = Resistance/Demand. FS > 1 means capacity exceeds demand."},
  {id:"s10",cat:"Structural",mode:"conceptual",diff:"Medium",q:"Creep in concrete is:",opts:["A. Sudden failure under impact","B. Long-term deformation under sustained load","C. Cracking due to thermal expansion","D. Foundation settlement"],ans:"B",exp:"Creep is time-dependent deformation of concrete under sustained compressive stress."},
  {id:"s11",cat:"Structural",mode:"computational",diff:"Easy",q:"Simply supported beam: L=20 ft, w=2 kip/ft. Maximum moment:",opts:["A. 50 kip-ft","B. 100 kip-ft","C. 200 kip-ft","D. 400 kip-ft"],ans:"B",exp:"M = wL²/8 = 2×400/8 = 100 kip-ft",formula:"M = wL²/8"},
  {id:"s12",cat:"Structural",mode:"computational",diff:"Medium",q:"Rectangular beam b=10 in, h=18 in. Moment of inertia:",opts:["A. 2,430 in⁴","B. 4,860 in⁴","C. 8,748 in⁴","D. 1,215 in⁴"],ans:"B",exp:"I = bh³/12 = 10×5832/12 = 4,860 in⁴",formula:"I = bh³/12"},
  {id:"s13",cat:"Structural",mode:"computational",diff:"Medium",q:"M=100 kip-ft, I=4860 in⁴, c=9 in. Bending stress:",opts:["A. 1.1 ksi","B. 2.2 ksi","C. 4.4 ksi","D. 0.55 ksi"],ans:"B",exp:"σ = Mc/I = (100×12×9)/4860 = 10800/4860 ≈ 2.22 ksi",formula:"σ = Mc/I"},
  {id:"s14",cat:"Structural",mode:"computational",diff:"Medium",q:"SS beam: w=1 kip/ft, L=12 ft, E=29,000 ksi, I=200 in⁴. Midspan deflection:",opts:["A. 0.10 in","B. 0.27 in","C. 0.54 in","D. 0.05 in"],ans:"B",exp:"δ=5wL⁴/384EI. w=1/12 k/in, L=144 in → ≈0.27 in",formula:"δ = 5wL⁴/384EI"},
  {id:"s15",cat:"Structural",mode:"conceptual",diff:"Hard",q:"A fixed-end beam carries higher loads than SS beam because:",opts:["A. Fixed ends increase span","B. Negative moments at ends reduce midspan moment","C. Fixed ends prevent all deflection","D. Material strengthens at connections"],ans:"B",exp:"Fixed ends develop negative moments, reducing midspan positive moment from wL²/8 to wL²/24."},
  {id:"s16",cat:"Structural",mode:"conceptual",diff:"Hard",q:"Most efficient structural system for spans >300 ft:",opts:["A. Simply supported beam","B. Cantilever beam","C. Cable-stayed or suspension","D. Rigid frame"],ans:"C",exp:"Cables use tensile strength with minimal material — most efficient for very long spans."},
  {id:"s17",cat:"Structural",mode:"conceptual",diff:"Medium",q:"In LRFD design, load factors are applied to:",opts:["A. Resistance (capacity) side","B. Load (demand) side","C. Both sides equally","D. Neither — only ASD uses factors"],ans:"B",exp:"LRFD: factored loads (demand) ≤ φRn (factored resistance). Load factors amplify demand."},
  {id:"s18",cat:"Structural",mode:"conceptual",diff:"Easy",q:"Shear force diagram for a simply supported beam with a midpoint load is:",opts:["A. Parabolic","B. Triangular","C. Rectangular (step function)","D. Sinusoidal"],ans:"C",exp:"Point load creates a step/rectangular SFD — constant shear between supports and load."},
  {id:"s19",cat:"Structural",mode:"conceptual",diff:"Medium",q:"The moment diagram for a simply supported beam with UDL is:",opts:["A. Linear (straight line)","B. Parabolic","C. Constant","D. Step function"],ans:"B",exp:"M = wx(L−x)/2 — a parabola with max at midspan."},
  {id:"s20",cat:"Structural",mode:"conceptual",diff:"Hard",q:"Which type of support provides both horizontal and vertical reactions but no moment?",opts:["A. Fixed support","B. Pin support","C. Roller support","D. Free end"],ans:"B",exp:"Pin: provides Rx and Ry, no moment. Roller: Ry only. Fixed: Rx, Ry, and moment."},
  // TRANSPORTATION (14)
  {id:"t1",cat:"Transportation",mode:"conceptual",diff:"Easy",q:"Stopping Sight Distance (SSD) is the distance to:",opts:["A. Change lanes","B. Perceive a hazard and stop before reaching it","C. Complete a U-turn","D. Accelerate to highway speed"],ans:"B",exp:"SSD = perception-reaction distance + braking distance."},
  {id:"t2",cat:"Transportation",mode:"conceptual",diff:"Medium",q:"Superelevation on a horizontal curve counteracts:",opts:["A. Increases pavement thickness","B. Centrifugal force","C. Reduces drainage","D. Minimizes earthwork"],ans:"B",exp:"Superelevation (banking) tilts roadway inward to counter centripetal acceleration."},
  {id:"t3",cat:"Transportation",mode:"conceptual",diff:"Easy",q:"Design speed most directly controls:",opts:["A. Pavement material","B. Horizontal and vertical curve geometry","C. Number of lanes","D. Pavement markings"],ans:"B",exp:"Design speed determines min curve radii, sight distances, and grade limits."},
  {id:"t4",cat:"Transportation",mode:"conceptual",diff:"Medium",q:"LOS F represents:",opts:["A. Free flow","B. Stable flow at capacity","C. Forced flow, breakdown, stop-and-go","D. Unstable flow near capacity"],ans:"C",exp:"LOS F = forced or breakdown flow — demand exceeds capacity."},
  {id:"t5",cat:"Transportation",mode:"conceptual",diff:"Easy",q:"AASHTO Green Book covers:",opts:["A. Pavement material specs","B. Geometric design of highways","C. Traffic signal timing","D. Structural pavement design"],ans:"B",exp:"AASHTO Green Book = 'A Policy on Geometric Design of Highways and Streets'."},
  {id:"t6",cat:"Transportation",mode:"computational",diff:"Easy",q:"Speed = 60 mph, perception-reaction = 2.5 s. Reaction distance:",opts:["A. 88 ft","B. 132 ft","C. 176 ft","D. 220 ft"],ans:"D",exp:"d = 88 fps × 2.5 s = 220 ft (60 mph = 88 ft/s)",formula:"d = v × t  (60 mph = 88 ft/s)"},
  {id:"t7",cat:"Transportation",mode:"computational",diff:"Medium",q:"V=60 mph, e=0.08, f=0.12. Minimum radius R:",opts:["A. 500 ft","B. 1,000 ft","C. 1,200 ft","D. 2,000 ft"],ans:"C",exp:"R = V²/[15(e+f)] = 3600/[15×0.20] = 1,200 ft",formula:"R = V²/[15(e+f)]"},
  {id:"t8",cat:"Transportation",mode:"conceptual",diff:"Medium",q:"AADT is:",opts:["A. Peak hour volume","B. Total annual volume/365","C. Design hour volume","D. Max monthly volume"],ans:"B",exp:"AADT = total annual two-directional traffic / 365 days."},
  {id:"t9",cat:"Transportation",mode:"computational",diff:"Medium",q:"Flow = 1,200 veh/hr, speed = 40 mph. Density:",opts:["A. 15 veh/mi","B. 30 veh/mi","C. 48,000 veh/mi","D. 1 veh/mi"],ans:"B",exp:"k = q/u = 1200/40 = 30 veh/mi",formula:"k = q/u"},
  {id:"t10",cat:"Transportation",mode:"conceptual",diff:"Hard",q:"Highest capacity intersection control:",opts:["A. All-way stop","B. Two-way stop","C. Signalized intersection","D. Roundabout"],ans:"C",exp:"Signalized intersections provide highest capacity through time-sharing of right-of-way."},
  {id:"t11",cat:"Transportation",mode:"conceptual",diff:"Medium",q:"Sag vertical curve design is controlled by:",opts:["A. Daytime stopping sight distance","B. Headlight sight distance and rider comfort","C. Passing sight distance","D. Decision sight distance"],ans:"B",exp:"Sag curve: headlight illumination at night and vertical curve comfort (centrifugal acceleration)."},
  {id:"t12",cat:"Transportation",mode:"conceptual",diff:"Easy",q:"The design vehicle controls:",opts:["A. Pavement thickness","B. Turning radii and lane width geometry","C. Signal timing","D. Pavement marking colors"],ans:"B",exp:"Design vehicle dimensions determine minimum turning radii, lane widths, and clearances."},
  {id:"t13",cat:"Transportation",mode:"conceptual",diff:"Hard",q:"K-value for a vertical curve relates:",opts:["A. Curvature to length","B. Length of curve to algebraic difference in grades","C. Grade to speed","D. Volume to capacity"],ans:"B",exp:"K = L/A where L = curve length and A = algebraic difference in grades (%). Higher K = flatter curve."},
  {id:"t14",cat:"Transportation",mode:"conceptual",diff:"Medium",q:"The purpose of a transition (spiral) curve is to:",opts:["A. Reduce pavement cost","B. Provide a gradual change from tangent to circular curve","C. Increase sight distance","D. Reduce earthwork"],ans:"B",exp:"Spiral curves allow gradual introduction of superelevation and centrifugal force — improving ride quality."},
  // WATER RESOURCES (14)
  {id:"w1",cat:"Water Resources",mode:"conceptual",diff:"Easy",q:"Manning's equation calculates:",opts:["A. Groundwater flow","B. Open channel flow velocity","C. Pipe pressure loss","D. Wave height"],ans:"B",exp:"Manning's V=(1/n)R^(2/3)S^(1/2) applies to open channel (gravity) flow."},
  {id:"w2",cat:"Water Resources",mode:"conceptual",diff:"Medium",q:"Critical flow (Fr=1) in an open channel:",opts:["A. Maximum energy","B. Minimum specific energy for a given discharge","C. Maximum velocity","D. Zero shear"],ans:"B",exp:"At critical flow, specific energy is minimum for a given Q."},
  {id:"w3",cat:"Water Resources",mode:"conceptual",diff:"Easy",q:"Q = VA (continuity equation) states:",opts:["A. Pressure × area = constant","B. Flow rate = velocity × cross-sectional area","C. Energy is conserved","D. Head loss ∝ velocity"],ans:"B",exp:"Q = VA: volume flow rate = velocity × cross-sectional area."},
  {id:"w4",cat:"Water Resources",mode:"conceptual",diff:"Medium",q:"Rational Method Q = CiA estimates:",opts:["A. Groundwater recharge","B. Peak stormwater runoff","C. Evapotranspiration","D. Base flow"],ans:"B",exp:"Rational Method: C=runoff coeff, i=intensity, A=drainage area — peak runoff from small watersheds."},
  {id:"w5",cat:"Water Resources",mode:"conceptual",diff:"Hard",q:"A hydraulic jump transitions flow from:",opts:["A. Subcritical to supercritical","B. Supercritical to subcritical","C. Laminar to turbulent","D. Pressurized to open channel"],ans:"B",exp:"Hydraulic jump: abrupt Fr>1 to Fr<1 transition with significant energy loss."},
  {id:"w6",cat:"Water Resources",mode:"conceptual",diff:"Easy",q:"Darcy-Weisbach equation gives:",opts:["A. Open channel flow depth","B. Friction head loss in a pipe","C. Groundwater elevation","D. Rainfall intensity"],ans:"B",exp:"hf = f(L/D)(V²/2g) — friction head loss in pressurized pipes."},
  {id:"w7",cat:"Water Resources",mode:"computational",diff:"Easy",q:"Pipe D=12 in, V=4 fps. Flow rate Q:",opts:["A. 3.14 cfs","B. 6.28 cfs","C. 12.6 cfs","D. 1.57 cfs"],ans:"A",exp:"A=π(0.5)²=0.785 ft². Q=VA=4×0.785=3.14 cfs",formula:"Q = V×A, A = πD²/4"},
  {id:"w8",cat:"Water Resources",mode:"conceptual",diff:"Medium",q:"100-year storm annual probability of exceedance:",opts:["A. 1%","B. 10%","C. 0.1%","D. 100%"],ans:"A",exp:"T=1/P → 100-yr storm: P=1/100=1% annual probability."},
  {id:"w9",cat:"Water Resources",mode:"computational",diff:"Hard",q:"Water flows from z=20 ft (V≈0, P=0) to z=10 ft. Exit velocity (no losses):",opts:["A. 8 fps","B. 16 fps","C. 25 fps","D. 32 fps"],ans:"C",exp:"V=√(2g×Δz)=√(2×32.2×10)=√644≈25.4 fps",formula:"V = √(2g·Δz)"},
  {id:"w10",cat:"Water Resources",mode:"conceptual",diff:"Easy",q:"BOD measures:",opts:["A. Dissolved oxygen in stream","B. Oxygen consumed by biological activity","C. Water hardness","D. pH of wastewater"],ans:"B",exp:"BOD = oxygen consumed by microorganisms breaking down organic matter."},
  {id:"w11",cat:"Water Resources",mode:"conceptual",diff:"Medium",q:"Time of concentration tc is:",opts:["A. Time for rainfall to stop","B. Travel time from farthest point to watershed outlet","C. Time for flood to peak","D. Groundwater recharge time"],ans:"B",exp:"tc = travel time from hydraulically most remote point to outlet."},
  {id:"w12",cat:"Water Resources",mode:"conceptual",diff:"Hard",q:"Hazen-Williams C coefficient: higher C means:",opts:["A. Larger diameter pipe","B. Smoother pipe, less friction loss","C. Higher flow velocity","D. Heavier pipe material"],ans:"B",exp:"Higher C = smoother pipe = less head loss. New CI ≈ 130; old corroded ≈ 80-100."},
  {id:"w13",cat:"Water Resources",mode:"conceptual",diff:"Medium",q:"Evapotranspiration combines:",opts:["A. Evaporation from soil + plant transpiration","B. Rainfall + runoff","C. Stream flow + groundwater","D. Infiltration + percolation"],ans:"A",exp:"ET = evaporation (soil/water surfaces) + transpiration (plants)."},
  {id:"w14",cat:"Water Resources",mode:"computational",diff:"Medium",q:"Manning's n=0.013, R=1.5 ft, S=0.001. Velocity V (US units):",opts:["A. 2.1 fps","B. 3.5 fps","C. 4.7 fps","D. 6.1 fps"],ans:"C",exp:"V=(1.486/0.013)×1.5^(0.667)×0.001^(0.5)=114.3×1.31×0.0316≈4.7 fps",formula:"V = (1.486/n)R^(2/3)S^(1/2)"},
  // CONSTRUCTION (12)
  {id:"c1",cat:"Construction",mode:"conceptual",diff:"Easy",q:"Critical path in CPM:",opts:["A. Costs the most","B. Determines shortest project completion time with zero float","C. Has the most float","D. Uses the most labor"],ans:"B",exp:"Critical path = longest path through network = minimum project duration. Zero total float."},
  {id:"c2",cat:"Construction",mode:"conceptual",diff:"Medium",q:"Total float is:",opts:["A. Time saved by overtime","B. Max delay without delaying project completion","C. Extra budget","D. Activity duration"],ans:"B",exp:"Float = LS−ES = LF−EF. How much activity can slip without affecting end date."},
  {id:"c3",cat:"Construction",mode:"conceptual",diff:"Easy",q:"A performance bond guarantees:",opts:["A. Payment to subcontractors","B. Project completion by contractor","C. Bid price validity","D. Material quality"],ans:"B",exp:"Performance bond guarantees contractor completes the project. Payment bond covers subs/suppliers."},
  {id:"c4",cat:"Construction",mode:"conceptual",diff:"Medium",q:"Contract type placing MOST risk on contractor:",opts:["A. Cost plus fixed fee","B. Cost plus percentage","C. Lump sum (fixed price)","D. Unit price"],ans:"C",exp:"Lump sum: contractor absorbs all cost overruns — maximum contractor risk."},
  {id:"c5",cat:"Construction",mode:"conceptual",diff:"Easy",q:"OSHA fall protection in construction required at:",opts:["A. 4 ft","B. 6 ft","C. 8 ft","D. 10 ft"],ans:"B",exp:"OSHA: 6 ft in construction, 4 ft in general industry for fall protection."},
  {id:"c6",cat:"Construction",mode:"conceptual",diff:"Medium",q:"Compaction typically specified as % of:",opts:["A. In-situ density","B. Max dry unit weight from Proctor test","C. Saturated unit weight","D. Specific gravity"],ans:"B",exp:"Compaction spec: e.g., 95% of max dry unit weight from standard or modified Proctor."},
  {id:"c7",cat:"Construction",mode:"conceptual",diff:"Hard",q:"CPI (Cost Performance Index) in EVM:",opts:["A. PV/AC","B. EV/AC","C. AC/PV","D. EV/PV"],ans:"B",exp:"CPI=EV/AC. >1=under budget; <1=over budget. SPI=EV/PV (schedule)."},
  {id:"c8",cat:"Construction",mode:"conceptual",diff:"Easy",q:"Sheeting and shoring in excavations primarily:",opts:["A. Improves bearing capacity","B. Prevents cave-ins, protects workers","C. Dewaters excavation","D. Compacts subgrade"],ans:"B",exp:"OSHA requires protective systems to prevent trench/excavation cave-ins."},
  {id:"c9",cat:"Construction",mode:"conceptual",diff:"Medium",q:"Design-Build (DB) differs from Design-Bid-Build (DBB) in that:",opts:["A. DB costs more","B. DB gives owner single point of responsibility for design and construction","C. DBB is faster","D. DB eliminates owner's rep"],ans:"B",exp:"In DB, one entity handles both design and construction — reduced coordination and often faster."},
  {id:"c10",cat:"Construction",mode:"conceptual",diff:"Medium",q:"A change order modifies the contract:",opts:["A. Replaces contractor","B. Changes scope, cost, or schedule","C. Transfers ownership","D. Terminates contract"],ans:"B",exp:"Change orders formally modify the contract — any scope/cost/time change needs a written CO."},
  {id:"c11",cat:"Construction",mode:"conceptual",diff:"Hard",q:"Schedule Performance Index (SPI) < 1.0 means:",opts:["A. Under budget","B. Ahead of schedule","C. Behind schedule","D. At risk of cancellation"],ans:"C",exp:"SPI=EV/PV. SPI<1=behind schedule (earned less value than planned)."},
  {id:"c12",cat:"Construction",mode:"conceptual",diff:"Medium",q:"A bid bond ensures:",opts:["A. Material quality","B. Bidder will enter contract if awarded","C. Worker safety","D. Project completion"],ans:"B",exp:"Bid bond protects owner if low bidder refuses to execute contract after award."},
  // ENVIRONMENTAL (10)
  {id:"env1",cat:"Environmental",mode:"conceptual",diff:"Easy",q:"Primary wastewater treatment removes:",opts:["A. Dissolved nutrients","B. Suspended solids by physical settling","C. Pathogens","D. BOD"],ans:"B",exp:"Primary treatment uses sedimentation to physically remove suspended solids."},
  {id:"env2",cat:"Environmental",mode:"conceptual",diff:"Medium",q:"Activated sludge is:",opts:["A. Primary treatment","B. Tertiary treatment","C. Secondary biological treatment","D. Disinfection"],ans:"C",exp:"Activated sludge uses microorganisms to degrade dissolved organics — secondary treatment."},
  {id:"env3",cat:"Environmental",mode:"conceptual",diff:"Easy",q:"SDWA regulates:",opts:["A. Wastewater discharge","B. Public drinking water quality","C. Construction stormwater","D. Groundwater extraction"],ans:"B",exp:"Safe Drinking Water Act sets MCLs for public water systems."},
  {id:"env4",cat:"Environmental",mode:"conceptual",diff:"Medium",q:"NPDES permits cover:",opts:["A. Underground storage tanks","B. Point source discharges to navigable waters","C. Air emissions","D. Hazardous waste disposal"],ans:"B",exp:"NPDES regulates point source discharges under the Clean Water Act."},
  {id:"env5",cat:"Environmental",mode:"conceptual",diff:"Hard",q:"Eutrophication is most commonly caused by:",opts:["A. Excess dissolved oxygen","B. Excess nitrogen and phosphorus","C. Suspended sediment","D. pH reduction"],ans:"B",exp:"Excess N and P cause algal blooms, depleting DO and harming aquatic life."},
  {id:"env6",cat:"Environmental",mode:"conceptual",diff:"Easy",q:"Chlorination of drinking water:",opts:["A. Removes hardness","B. Disinfects and kills pathogens","C. Adjusts pH","D. Removes iron"],ans:"B",exp:"Chlorination = primary disinfection method for drinking water."},
  {id:"env7",cat:"Environmental",mode:"computational",diff:"Medium",q:"BOD5=200 mg/L, k=0.23/day. Ultimate BOD:",opts:["A. 230 mg/L","B. 290 mg/L","C. 320 mg/L","D. 400 mg/L"],ans:"B",exp:"200=BODu(1−e^−1.15)=BODu(0.683)→BODu=293≈290 mg/L",formula:"BOD_t = BOD_u(1−e^{−kt})"},
  {id:"env8",cat:"Environmental",mode:"conceptual",diff:"Medium",q:"Sanitary landfill vs open dump:",opts:["A. Accepts only household waste","B. Uses daily cover and leachate collection","C. Located in rural areas","D. No organic waste"],ans:"B",exp:"Sanitary landfills use compaction, daily soil cover, and leachate/gas management."},
  {id:"env9",cat:"Environmental",mode:"conceptual",diff:"Hard",q:"Non-point source pollution is:",opts:["A. Pollution from a single pipe","B. Diffuse pollution from runoff over land","C. Industrial discharge","D. Single-spill groundwater contamination"],ans:"B",exp:"Non-point source = diffuse sources (agricultural/urban runoff) — no single pipe outfall."},
  {id:"env10",cat:"Environmental",mode:"conceptual",diff:"Medium",q:"DO below what level cannot support most fish?",opts:["A. 1 mg/L","B. 5 mg/L","C. 10 mg/L","D. 14 mg/L"],ans:"B",exp:"Most fish require DO > 5 mg/L. Below 5 is hypoxic; below 2 essentially anoxic."},
  // SURVEYING (10)
  {id:"sv1",cat:"Surveying",mode:"conceptual",diff:"Easy",q:"A benchmark is:",opts:["A. A measured horizontal distance","B. A point of known elevation used as reference","C. A property corner","D. A GPS control point"],ans:"B",exp:"Benchmark = permanent reference point of known elevation for differential leveling."},
  {id:"sv2",cat:"Surveying",mode:"conceptual",diff:"Medium",q:"Traverse closure error is:",opts:["A. Difference in measured vs. calculated bearings","B. Distance between computed and actual closing point","C. Horizontal vs. vertical distance diff","D. Two independent angle measurements"],ans:"B",exp:"Closure error = linear distance between computed and actual closing point."},
  {id:"sv3",cat:"Surveying",mode:"computational",diff:"Easy",q:"HI=105.42 ft, foresight rod=3.21 ft. Unknown elevation:",opts:["A. 102.21 ft","B. 108.63 ft","C. 105.42 ft","D. 108.21 ft"],ans:"A",exp:"Elev = HI − FS = 105.42 − 3.21 = 102.21 ft",formula:"Elev = HI − Foresight"},
  {id:"sv4",cat:"Surveying",mode:"conceptual",diff:"Medium",q:"A Total Station combines:",opts:["A. Level and rod","B. Electronic theodolite and EDM","C. GPS and compass","D. Planimeter and level"],ans:"B",exp:"Total Station = electronic theodolite (angles) + EDM (distances)."},
  {id:"sv5",cat:"Surveying",mode:"conceptual",diff:"Easy",q:"A backsight is taken on:",opts:["A. Unknown elevation point","B. A point of known elevation","C. A turning point ahead","D. Benchmark only"],ans:"B",exp:"Backsight (BS) on known elevation establishes Height of Instrument (HI)."},
  {id:"sv6",cat:"Surveying",mode:"computational",diff:"Medium",q:"Bearing N 45° E as azimuth (from north, CW):",opts:["A. 45°","B. 135°","C. 225°","D. 315°"],ans:"A",exp:"N 45° E = azimuth 45°. N 45° W = 315°; S 45° E = 135°.",formula:"NE=bearing; SE=180°−bearing; SW=180°+bearing; NW=360°−bearing"},
  {id:"sv7",cat:"Surveying",mode:"conceptual",diff:"Hard",q:"East-west oriented states use which SPC projection?",opts:["A. Mercator","B. Lambert Conformal Conic","C. Transverse Mercator","D. Azimuthal Equidistant"],ans:"B",exp:"E-W states: Lambert Conformal Conic. N-S states: Transverse Mercator."},
  {id:"sv8",cat:"Surveying",mode:"conceptual",diff:"Medium",q:"GPS accuracy most affected by:",opts:["A. Time of day","B. Satellite geometry (PDOP) and atmospheric effects","C. Wind speed","D. Magnetic declination"],ans:"B",exp:"PDOP from satellite geometry and atmospheric signal delay are main GPS error sources."},
  {id:"sv9",cat:"Surveying",mode:"conceptual",diff:"Easy",q:"Purpose of a foresight in leveling:",opts:["A. Establish HI","B. Determine elevation of unknown point","C. Check calibration","D. Set benchmark"],ans:"B",exp:"Foresight (FS) = rod reading on unknown or turning point to calculate its elevation."},
  {id:"sv10",cat:"Surveying",mode:"conceptual",diff:"Hard",q:"Standard photogrammetric flight forward overlap is typically:",opts:["A. 10-20%","B. 30-40%","C. 60-80%","D. 90-95%"],ans:"C",exp:"Standard: 60% forward overlap (endlap), 20-30% sidelap between strips."},
  // PROJECT MANAGEMENT (10)
  {id:"pm1",cat:"Project Management",mode:"conceptual",diff:"Easy",q:"Gantt chart shows:",opts:["A. Project costs","B. Task durations on a timeline","C. Critical path","D. Team performance"],ans:"B",exp:"Gantt = tasks as horizontal bars against time axis — schedule visualization."},
  {id:"pm2",cat:"Project Management",mode:"conceptual",diff:"Medium",q:"SPI > 1.0 means:",opts:["A. Over budget","B. Behind schedule","C. Ahead of schedule","D. At risk"],ans:"C",exp:"SPI=EV/PV. SPI>1=ahead of schedule. CPI>1=under budget."},
  {id:"pm3",cat:"Project Management",mode:"conceptual",diff:"Easy",q:"Triple constraint in project management:",opts:["A. Cost, Schedule, Scope","B. Safety, Quality, Cost","C. Resources, Risk, Schedule","D. Design, Build, Operate"],ans:"A",exp:"Iron triangle: Cost, Schedule (Time), Scope — changing one affects the others."},
  {id:"pm4",cat:"Project Management",mode:"conceptual",diff:"Medium",q:"WBS organizes project by:",opts:["A. Calendar dates","B. Hierarchical decomposition of deliverables","C. Resource assignments","D. Risk levels"],ans:"B",exp:"WBS = hierarchical tree breaking project into smaller manageable deliverables."},
  {id:"pm5",cat:"Project Management",mode:"conceptual",diff:"Hard",q:"Risk mitigation means:",opts:["A. Accepting all risks","B. Transferring risk to owner","C. Reducing probability or impact of risk","D. Eliminating all uncertainty"],ans:"C",exp:"Mitigation reduces likelihood or consequence. Other strategies: accept, transfer, avoid."},
  {id:"pm6",cat:"Project Management",mode:"conceptual",diff:"Easy",q:"A program vs a project:",opts:["A. Program has fixed budget","B. Program = related projects managed together for coordinated benefit","C. Program is shorter","D. Program has one deliverable"],ans:"B",exp:"Program = group of related projects managed together to obtain benefits not available individually."},
  {id:"pm7",cat:"Project Management",mode:"conceptual",diff:"Medium",q:"Float on the critical path is:",opts:["A. Positive","B. Negative","C. Zero","D. Variable"],ans:"C",exp:"Critical path has zero float by definition — any delay directly delays project completion."},
  {id:"pm8",cat:"Project Management",mode:"conceptual",diff:"Hard",q:"Estimate at Completion (EAC) when CPI is expected to continue:",opts:["A. EAC = BAC − EV","B. EAC = BAC/CPI","C. EAC = AC + EV","D. EAC = PV/SPI"],ans:"B",exp:"If CPI trend continues: EAC = BAC/CPI. Budget at Completion / Cost Performance Index."},
  {id:"pm9",cat:"Project Management",mode:"conceptual",diff:"Medium",q:"A scope creep is best described as:",opts:["A. Planned scope changes","B. Uncontrolled expansion of project scope without adjusting time/cost","C. Reducing project scope","D. Adding contingency"],ans:"B",exp:"Scope creep = unauthorized scope growth without corresponding budget/schedule adjustments."},
  {id:"pm10",cat:"Project Management",mode:"conceptual",diff:"Easy",q:"The purpose of a schedule baseline is to:",opts:["A. Track costs","B. Provide a reference point to measure schedule performance","C. Define deliverables","D. Assign resources"],ans:"B",exp:"Baseline = approved plan used to compare actual progress and measure variance."},
  // UNITS & CONVERSIONS (18)
  {id:"u1",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"Fundamental difference between lbf and lbm:",opts:["A. Identical units","B. lbf = force; lbm = mass","C. lbm used in SI","D. lbf is larger by factor of 32.2"],ans:"B",exp:"lbf is force (what a scale reads). lbm is mass. Dimensionally different — numerically equal only at standard gravity."},
  {id:"u2",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"In F=ma (US Customary), m in lbm, a in ft/s². To get F in lbf you must:",opts:["A. Multiply by 32.2","B. Divide by gc = 32.174","C. No conversion needed","D. Multiply by 144"],ans:"B",exp:"F(lbf)=m(lbm)×a/gc. gc=32.174 lbm·ft/lbf·s². Forgetting gc is classic lbm/lbf error."},
  {id:"u3",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"1 kip equals:",opts:["A. 100 lb","B. 1,000 lb","C. 10,000 lb","D. 100 kN"],ans:"B",exp:"kip = kilopound = 1,000 lbf."},
  {id:"u4",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"1 psi equals how many psf?",opts:["A. 12 psf","B. 72 psf","C. 144 psf","D. 288 psf"],ans:"C",exp:"1 psi = 1 lb/in² × 144 in²/ft² = 144 psf."},
  {id:"u5",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"1 acre equals:",opts:["A. 10,000 ft²","B. 43,560 ft²","C. 100,000 ft²","D. 5,280 ft²"],ans:"B",exp:"1 acre = 43,560 ft². Critical for drainage area calculations."},
  {id:"u6",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"1 cfs ≈ how many gpm?",opts:["A. 60 gpm","B. 225 gpm","C. 449 gpm","D. 7.48 gpm"],ans:"C",exp:"1 cfs = 7.48 gal/ft³ × 60 s/min = 448.8 ≈ 449 gpm."},
  {id:"u7",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"1 meter ≈",opts:["A. 2.54 ft","B. 3.28 ft","C. 5.28 ft","D. 0.91 ft"],ans:"B",exp:"1 m = 3.281 ft; 1 ft = 0.3048 m."},
  {id:"u8",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"SI mass unit is:",opts:["A. Newton","B. Slug","C. Kilogram","D. Pound-mass"],ans:"C",exp:"SI mass = kg. Force = N (kg·m/s²). US Customary mass = slug or lbm."},
  {id:"u9",cat:"Units & Conversions",mode:"conceptual",diff:"Hard",q:"18 kN/m³ in pcf is approximately:",opts:["A. 80 pcf","B. 100 pcf","C. 115 pcf","D. 130 pcf"],ans:"C",exp:"18 kN/m³ × 6.366 ≈ 114.6 ≈ 115 pcf."},
  {id:"u10",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"1 slug equals approximately:",opts:["A. 1 lbm","B. 14.6 lbm","C. 32.2 lbm","D. 2.2 lbm"],ans:"C",exp:"1 slug = 32.174 lbm. Consistent mass unit for F=ma in lbf, ft, s."},
  {id:"u11",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"1 psi = ? kPa:",opts:["A. 1 kPa","B. 6.895 kPa","C. 144 kPa","D. 0.145 kPa"],ans:"B",exp:"1 psi = 6.895 kPa. Therefore 1 kPa = 0.145 psi."},
  {id:"u12",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"Specific weight of water in US Customary:",opts:["A. 62.4 pcf","B. 1,000 pcf","C. 8.34 pcf","D. 32.2 pcf"],ans:"A",exp:"γ_water = 62.4 pcf (lb/ft³). SI: 9.81 kN/m³."},
  {id:"u13",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"Distributed beam load w has units of:",opts:["A. Force/area","B. Force/length","C. Force only","D. Dimensionless"],ans:"B",exp:"w = force/length (kip/ft or kN/m). Pressure/stress = force/area."},
  {id:"u14",cat:"Units & Conversions",mode:"conceptual",diff:"Hard",q:"Using σ=Mc/I with M in kip-ft, c in ft, I in ft⁴. Result σ is in:",opts:["A. ksi","B. ksf","C. psi","D. psf"],ans:"B",exp:"σ=Mc/I=(kip-ft)(ft)/(ft⁴)=kip/ft²=ksf. Must be dimensionally consistent."},
  {id:"u15",cat:"Units & Conversions",mode:"conceptual",diff:"Easy",q:"1 mile equals:",opts:["A. 1,000 ft","B. 3,280 ft","C. 5,280 ft","D. 10,000 ft"],ans:"C",exp:"1 mile = 5,280 ft."},
  {id:"u16",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"P=ρgh is dimensionally correct because:",opts:["A. ρ×g×h = mass/volume × acceleration × length = force/area","B. It's an empirical formula only","C. ρ and γ are interchangeable","D. h cancels units"],ans:"A",exp:"ρ(kg/m³)×g(m/s²)×h(m)=kg/(m·s²)=N/m²=Pa. Dimensionally: force/area = pressure. ✓"},
  {id:"u17",cat:"Units & Conversions",mode:"conceptual",diff:"Hard",q:"Using lbm instead of lbf in a pressure calculation P=γh produces a result off by factor of:",opts:["A. 12","B. 144","C. 32.2","D. No difference"],ans:"C",exp:"γ_water=62.4 lbf/ft³. If ρ=62.4 lbm/ft³ used as weight density without gc, result is off by 32.2."},
  {id:"u18",cat:"Units & Conversions",mode:"conceptual",diff:"Medium",q:"kcf (kips per square foot) is most used for:",opts:["A. Pipeline pressure","B. Soil bearing capacity and pressure","C. Wind speed","D. Traffic loading"],ans:"B",exp:"Geotechnical engineers use ksf/kcf for bearing capacity and pressures (1 kcf = 1,000 psf)."},
  // STATICS (14)
  {id:"st1",cat:"Statics",mode:"conceptual",diff:"Easy",q:"For a body in static equilibrium, which conditions must be satisfied?",opts:["A. ΣF = 0 only","B. ΣM = 0 only","C. Both ΣF = 0 and ΣM = 0","D. ΣF = ma"],ans:"C",exp:"Static equilibrium requires both sum of forces AND sum of moments equal zero."},
  {id:"st2",cat:"Statics",mode:"conceptual",diff:"Easy",q:"A free body diagram (FBD) shows:",opts:["A. Internal forces only","B. All external forces and reactions acting on a body","C. Deformations","D. Material properties"],ans:"B",exp:"FBD isolates a body and shows all external forces, reactions, and moments acting on it."},
  {id:"st3",cat:"Statics",mode:"conceptual",diff:"Medium",q:"A couple consists of:",opts:["A. Two equal parallel forces in the same direction","B. Two equal, opposite, non-collinear forces producing pure rotation","C. A force and a moment","D. Three concurrent forces"],ans:"B",exp:"A couple = two equal and opposite forces separated by a distance — produces pure moment, no net force."},
  {id:"st4",cat:"Statics",mode:"computational",diff:"Easy",q:"A 10-ft simply supported beam has a 100-lb point load at midspan. Each reaction is:",opts:["A. 100 lb","B. 50 lb","C. 25 lb","D. 200 lb"],ans:"B",exp:"By symmetry and ΣFy=0: R1=R2=100/2=50 lb",formula:"ΣFy = 0, ΣM = 0"},
  {id:"st5",cat:"Statics",mode:"computational",diff:"Medium",q:"A 10-ft beam pinned at A, roller at B. 200-lb load at 4 ft from A. Reaction at B:",opts:["A. 80 lb","B. 120 lb","C. 100 lb","D. 160 lb"],ans:"A",exp:"ΣMA=0: RB×10=200×4 → RB=80 lb",formula:"ΣM_A = 0"},
  {id:"st6",cat:"Statics",mode:"conceptual",diff:"Medium",q:"The resultant of a force system is:",opts:["A. The largest force in the system","B. A single force (and/or moment) that has the same effect as all forces combined","C. Always zero in equilibrium","D. The average of all forces"],ans:"B",exp:"The resultant is the single equivalent force/moment that replaces the entire force system."},
  {id:"st7",cat:"Statics",mode:"conceptual",diff:"Easy",q:"A truss is statically determinate when:",opts:["A. m = 2j","B. m + r = 2j (m=members, r=reactions, j=joints)","C. All members are in tension","D. It has no external loads"],ans:"B",exp:"Determinacy check: m + r = 2j for a simple truss. m+r > 2j = indeterminate."},
  {id:"st8",cat:"Statics",mode:"conceptual",diff:"Hard",q:"The method of sections in truss analysis allows finding:",opts:["A. All member forces simultaneously","B. Forces in specific members by cutting through the truss","C. Deflection at any joint","D. Reactions only"],ans:"B",exp:"Method of sections: cut truss through 3 members, isolate a portion, apply equilibrium to find those forces."},
  {id:"st9",cat:"Statics",mode:"computational",diff:"Medium",q:"Moment of 50-lb force about a point 4 ft away (perpendicular distance):",opts:["A. 12.5 lb-ft","B. 54 lb-ft","C. 200 lb-ft","D. 46 lb-ft"],ans:"C",exp:"M = F × d = 50 × 4 = 200 lb-ft",formula:"M = F × d"},
  {id:"st10",cat:"Statics",mode:"conceptual",diff:"Medium",q:"Varignon's theorem states:",opts:["A. Sum of moments equals sum of forces","B. Moment of a resultant = sum of moments of component forces","C. Forces in a truss are always axial","D. Equilibrium requires three equations"],ans:"B",exp:"Varignon's: M_resultant = ΣM_components. Useful for finding moment arm of complex force systems."},
  {id:"st11",cat:"Statics",mode:"conceptual",diff:"Easy",q:"A roller support provides:",opts:["A. Horizontal and vertical reactions + moment","B. Only a reaction perpendicular to the rolling surface","C. Horizontal and vertical reactions only","D. Only a moment"],ans:"B",exp:"Roller = one reaction perpendicular to surface (typically vertical). No horizontal, no moment."},
  {id:"st12",cat:"Statics",mode:"conceptual",diff:"Medium",q:"Center of gravity of a uniform rectangular plate is at:",opts:["A. One corner","B. The geometric centroid (intersection of diagonals)","C. The midpoint of the longest side","D. The bottom edge"],ans:"B",exp:"For uniform density, center of gravity = centroid = geometric center."},

function getSRData(){ try{ return JSON.parse(localStorage.getItem('sr')||'{}'); }catch(e){ return {}; } }
function saveSRData(d){ localStorage.setItem('sr',JSON.stringify(d)); }
function updateSR(qid, correct, conf){
  const sr = getSRData();
  const q = sr[qid]||{interval:1,ease:2.5,due:0,reps:0};
  if(correct){
    q.reps++;
    if(conf==="Got it ✓") q.ease=Math.min(q.ease+0.15, 3.0);
    else if(conf==="Shaky ~") q.ease=Math.max(q.ease-0.1, 1.3);
    q.interval = q.reps===1?1:q.reps===2?3:Math.round(q.interval*q.ease);
  } else {
    q.reps=0; q.interval=1; q.ease=Math.max(q.ease-0.2,1.3);
  }
  q.due = Date.now() + q.interval*86400000;
  sr[qid]=q; saveSRData(sr);
}
function getSRDueQuestions(cat, mode, diff, count){
  const sr=getSRData(), now=Date.now();
  let pool=QB.filter(q=>q.id in sr && sr[q.id].due<=now);
  if(cat!=="All Topics") pool=pool.filter(q=>q.cat===cat);
  if(mode!=="both") pool=pool.filter(q=>q.mode===mode);
  if(diff!=="Mixed") pool=pool.filter(q=>q.diff===diff);
  return pool.sort(()=>Math.random()-0.5).slice(0,count);
}

function getStats(){ try{ return JSON.parse(localStorage.getItem('allStats')||'{}'); }catch(e){ return {}; } }
function saveStats(s){ localStorage.setItem('allStats',JSON.stringify(s)); }
function updateAllStats(cat, correct){
  const s=getStats();
  const prev=s[cat]||{c:0,t:0};
  s[cat]={c:prev.c+(correct?1:0),t:prev.t+1};
  saveStats(s);
}
function getDayStreak(){
  try{
    const d=JSON.parse(localStorage.getItem('dayStreak')||'{"streak":0,"last":0}');
    const today=new Date().toDateString();
    const last=new Date(d.last).toDateString();
    return d;
  }catch(e){ return {streak:0,last:0}; }
}
function updateDayStreak(){
  const d=getDayStreak();
  const today=new Date().toDateString();
  const last=new Date(d.last).toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(today===last) return d;
  if(last===yesterday) d.streak++;
  else d.streak=1;
  d.last=Date.now();
  localStorage.setItem('dayStreak',JSON.stringify(d));
  return d;
}
function getSessionHistory(){ try{ return JSON.parse(localStorage.getItem('sessions')||'[]'); }catch(e){ return []; } }
function saveSession(score,total,mode,cat){
  const h=getSessionHistory();
  h.unshift({score,total,mode,cat,date:new Date().toLocaleDateString()});
  localStorage.setItem('sessions',JSON.stringify(h.slice(0,10)));
}

async function fetchAI(cat,mode,diff,count){
  const topic=cat==="All Topics"?"all Civil FE subjects":cat;
  const prompt=`Generate ${count} ${mode} Civil FE exam questions on ${topic}. ${diff==="Mixed"?"Mix difficulties.":diff+" level."} ${mode==="conceptual"?"NO math. Definitions, principles, codes.":"Require calculation. Core formulas. 1-2 steps."} Return ONLY raw JSON: [{"q":"...","opts":["A. ...","B. ...","C. ...","D. ..."],"ans":"A","exp":"...","cat":"${cat}","diff":"Medium","formula":null}]`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  const text=data.content?.map(b=>b.text||"").join("")||"";
  const match=text.match(/\[[\s\S]*\]/);
  if(!match) throw new Error("No JSON");
  return JSON.parse(match[0]).map(q=>({...q,id:"ai-"+Math.random(),mode}));
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function startQuiz(){
S.error=””; S.answers=[]; S.current=0; S.selected=null;
S.streak=0; S.bestStreak=0; S.flagged=new Set(); S.confRatings={}; S.sessionStats={};
S.srMode=false;
let qs=getQuestions(S.cat,S.mode,S.diff,S.count);
if(qs.length<S.count){
try{ S.screen=“loading”; render(); const ai=await fetchAI(S.cat,S.mode,S.diff,S.count); qs=[…qs,…ai].slice(0,S.count); }
catch(e){ if(!qs.length){ S.error=“Not enough questions. Try broader settings.”; S.screen=“home”; render(); return; } }
}
S.questions=qs; S.screen=“quiz”; updateDayStreak(); render(); startTimer();
}

async function startSR(){
S.error=””; S.answers=[]; S.current=0; S.selected=null;
S.streak=0; S.bestStreak=0; S.flagged=new Set(); S.confRatings={}; S.sessionStats={};
S.srMode=true;
let qs=getSRDueQuestions(S.cat,S.mode,S.diff,S.count);
if(!qs.length){ S.error=“No spaced repetition cards due right now.”; render(); return; }
S.questions=qs; S.screen=“quiz”; render(); startTimer();
}

function startWeakSpot(){
const allS=getStats();
const weak=Object.entries(allS).filter(([,v])=>v.t>=3&&(v.c/v.t)<0.7).map(([cat])=>cat);
if(!weak.length){ S.error=“No weak spots found yet — keep quizzing!”; render(); return; }
const prevCat=S.cat; S.cat=weak[Math.floor(Math.random()*weak.length)];
S.error=””; S.answers=[]; S.current=0; S.selected=null;
S.streak=0; S.bestStreak=0; S.flagged=new Set(); S.confRatings={}; S.sessionStats={};
let qs=getQuestions(S.cat,S.mode,S.diff,S.count);
if(!qs.length){ S.cat=prevCat; S.error=“No questions for weak category. Try All Topics.”; render(); return; }
S.questions=qs; S.screen=“quiz”; render(); startTimer();
}

function startTimer(){
clearInterval(S.timerInterval);
if(!S.timer) return;
S.timeLeft=S.timer;
S.timerInterval=setInterval(()=>{
S.timeLeft–;
const el=document.getElementById(“timer-el”);
if(el){ el.textContent=S.timeLeft+“s”; if(S.timeLeft<=10) el.classList.add(“timer-warn”); }
if(S.timeLeft<=0){ clearInterval(S.timerInterval); S.selected=”**timeout**”; render(); }
},1000);
}

function pickOpt(opt){
if(S.selected!==null) return;
clearInterval(S.timerInterval);
S.selected=opt; render();
}

function pickConf(c){
S.confRatings[S.current]=c;
render();
}

function toggleFlag(){
if(S.flagged.has(S.current)) S.flagged.delete(S.current);
else S.flagged.add(S.current);
render();
}

function nextQ(conf){
const q=S.questions[S.current];
const sel=S.selected===”**timeout**”?null:S.selected;
const correct=sel?.charAt(0)===(q.ans||q.answer);
const cr=conf||S.confRatings[S.current]||null;
if(S.srMode||getSRData()[q.id]!==undefined) updateSR(q.id,correct,cr);
else if(correct) updateSR(q.id,correct,cr); // start tracking
const newStreak=correct?S.streak+1:0;
S.streak=newStreak; if(newStreak>S.bestStreak) S.bestStreak=newStreak;
const cat=q.cat||q.category;
const prev=S.sessionStats[cat]||{c:0,t:0};
S.sessionStats[cat]={c:prev.c+(correct?1:0),t:prev.t+1};
updateAllStats(cat,correct);
S.answers.push({…q,selected:sel,correct,timedOut:S.selected===”**timeout**”});
if(S.current+1<S.questions.length){ S.current++; S.selected=null; render(); startTimer(); }
else{ saveSession(S.answers.filter(a=>a.correct).length,S.answers.length,S.mode,S.cat); S.screen=“results”; render(); }
}

render();
